let appOptions = { coordinateurs:[], flux:[], projectOptions:[], customFlux:[] };

let morningRoutineItems = [];
let morningRoutineState = { date:'', checked:{} };

const DEFAULT_MORNING_ROUTINE = [
  'Bexio : traitement des nouvelles entrées',
  'Bexio : traitements des nouvelles factures',
  'PV : Traiter les points au PV',
  'Glate : Traitements des points tagués',
  'E-Mail : Traitements des mails'
];

function loadMorningRoutineItems(){
  const v = lsGet('morningRoutineItems');
  if(v) return JSON.parse(v);
  return DEFAULT_MORNING_ROUTINE.map(text => ({ id: uid(), text }));
}
function saveMorningRoutineItems(){
  flashSaveStatus(lsSet('morningRoutineItems', JSON.stringify(morningRoutineItems)));
}
function loadMorningRoutineState(){
  const v = lsGet('morningRoutineState');
  return v ? JSON.parse(v) : { date:'', checked:{} };
}
function saveMorningRoutineState(){
  lsSet('morningRoutineState', JSON.stringify(morningRoutineState));
}

function allRoutineChecked(){
  return morningRoutineItems.length > 0 && morningRoutineItems.every(it => morningRoutineState.checked[it.id]);
}

function openMorningRoutineModal(){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';

  function close(){
    if(backdrop.parentNode) document.body.removeChild(backdrop);
  }

  function render(){
    backdrop.innerHTML = `
      <div class="modal manual-modal">
        <h3>🌄 Routine du matin</h3>
        <p class="confirm-msg" style="margin-bottom:14px;">Coche les points au fur et à mesure. Cette liste se réinitialise chaque jour — modifiable dans Réglages.</p>
        <div class="modal-scroll manual-scroll">
          <div class="routine-list">
            ${morningRoutineItems.length ? morningRoutineItems.map(it => `
              <label class="routine-item ${morningRoutineState.checked[it.id]?'done':''}">
                <input type="checkbox" class="routine-check" data-id="${it.id}" ${morningRoutineState.checked[it.id]?'checked':''}>
                <span class="routine-text">${escapeHtml(it.text)}</span>
              </label>
            `).join('') : '<div class="settings-empty">Aucun point défini — ajoute-en dans Réglages.</div>'}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-text" id="routineLaterBtn">⏰ Plus tard</button>
          <button class="btn btn-primary" id="routineDoneBtn">✓ Terminer</button>
        </div>
      </div>
    `;
    backdrop.querySelectorAll('.routine-check').forEach(cb => cb.addEventListener('change', () => {
      morningRoutineState.checked[cb.dataset.id] = cb.checked;
      saveMorningRoutineState();
      if(allRoutineChecked()){
        morningRoutineState.snoozeUntil = null;
        saveMorningRoutineState();
        showToast('Routine du matin terminée 👍');
        close();
        return;
      }
      render();
    }));
    backdrop.querySelector('#routineLaterBtn').addEventListener('click', () => {
      morningRoutineState.snoozeUntil = Date.now() + 3600000;
      saveMorningRoutineState();
      close();
      setTimeout(() => {
        if(!allRoutineChecked()) openMorningRoutineModal();
      }, 3600000);
      showToast('Ça revient dans 1h');
    });
    backdrop.querySelector('#routineDoneBtn').addEventListener('click', async () => {
      const ok = await customConfirm('As-tu bien terminé tous les points de la routine du matin ?', { okText:'Oui, terminé', cancelText:'Pas encore', danger:false });
      if(!ok) return;
      morningRoutineState.snoozeUntil = null;
      saveMorningRoutineState();
      close();
    });
  }
  render();
  document.body.appendChild(backdrop);
}

/* ============================= FLUX CHECKLIST EDITOR (Réglages) ============================= */

let editingFlux = null;

function renderFluxTemplateEditor(){
  const host = $('#fluxTemplateEditor');
  if(!host) return;

  const fluxes = getAllFluxOptions();
  const tabsHtml = `<div class="flux-tabs">
    ${fluxes.map(f => `
      <span class="flux-tab-wrap">
        <button class="flux-tab-btn ${editingFlux===f?'active':''}" data-flux="${escapeHtml(f)}">${escapeHtml(f)}</button>
        ${appOptions.customFlux.includes(f) ? `<button class="flux-tab-del" data-flux="${escapeHtml(f)}" title="Supprimer ce flux">×</button>` : ''}
      </span>
    `).join('')}
    <button class="flux-tab-btn flux-tab-add" id="fluxAddBtn" title="Ajouter un flux personnalisé">+ Flux</button>
  </div>`;

  let bodyHtml;
  if(!editingFlux){
    bodyHtml = `<div class="settings-empty">Choisis un flux ci-dessus pour afficher sa checklist.</div>`;
  } else {
    const template = getFluxTemplate(editingFlux);
    const partiesHtml = template.map((partie, pIdx) => `
      <div class="flux-partie-card">
        <div class="flux-partie-head">
          <input type="text" class="flux-partie-title" data-p="${pIdx}" value="${escapeHtml(partie.title)}" placeholder="Nom de la partie">
          <button class="flux-partie-del" data-p="${pIdx}" title="Supprimer cette partie">🗑</button>
        </div>
        ${partie.sections.map((sec, sIdx) => `
          <div class="flux-section-card">
            <div class="flux-section-head">
              <input type="text" class="flux-section-title" data-p="${pIdx}" data-s="${sIdx}" value="${escapeHtml(sec.title)}" placeholder="Nom de la sous-partie">
              <button class="flux-section-del" data-p="${pIdx}" data-s="${sIdx}" title="Supprimer cette sous-partie">×</button>
            </div>
            <div class="flux-items-list">
              ${sec.items.map((item, iIdx) => `
                <div class="flux-item-row">
                  <input type="text" class="flux-item-text" data-p="${pIdx}" data-s="${sIdx}" data-i="${iIdx}" value="${escapeHtml(item)}">
                  <button class="flux-item-del" data-p="${pIdx}" data-s="${sIdx}" data-i="${iIdx}" title="Supprimer ce point">×</button>
                </div>
              `).join('') || '<div class="settings-empty">Aucun point.</div>'}
            </div>
            <div class="flux-add-row">
              <input type="text" class="flux-item-add-input" data-p="${pIdx}" data-s="${sIdx}" placeholder="Nouveau point…">
              <button class="btn btn-ghost btn-sm flux-item-add-btn" data-p="${pIdx}" data-s="${sIdx}">+ Point</button>
            </div>
          </div>
        `).join('')}
        <div class="flux-add-row">
          <input type="text" class="flux-section-add-input" data-p="${pIdx}" placeholder="Nouvelle sous-partie…">
          <button class="btn btn-ghost btn-sm flux-section-add-btn" data-p="${pIdx}">+ Sous-partie</button>
        </div>
      </div>
    `).join('');

    bodyHtml = `
      ${template.length ? `<button class="btn btn-ghost btn-sm" id="fluxBlankChecklistBtn" style="margin-bottom:14px;">🖶 Télécharger une checklist vierge (${editingFlux})</button>` : ''}
      ${template.length ? partiesHtml : '<div class="settings-empty">Aucune partie pour l\u2019instant — ajoute-en une ci-dessous.</div>'}
      <div class="flux-add-row" style="margin-top:6px;">
        <input type="text" id="fluxPartieAddInput" placeholder="Nouvelle partie…">
        <button class="btn btn-primary" id="fluxPartieAddBtn">+ Ajouter une partie</button>
      </div>
    `;
  }

  host.innerHTML = tabsHtml + bodyHtml;

  host.querySelectorAll('.flux-tab-btn:not(.flux-tab-add)').forEach(btn => btn.addEventListener('click', () => {
    editingFlux = (editingFlux === btn.dataset.flux) ? null : btn.dataset.flux;
    renderFluxTemplateEditor();
  }));
  const addFluxBtn = $('#fluxAddBtn');
  if(addFluxBtn) addFluxBtn.addEventListener('click', async () => {
    const name = await customPrompt('Nouveau flux', 'ex. MI-3, SAV, etc.');
    if(!name) return;
    if(getAllFluxOptions().includes(name)){ showToast('Ce flux existe déjà'); return; }
    appOptions.customFlux.push(name);
    saveAppOptions();
    checklistTemplates[name] = [];
    saveChecklistTemplates();
    editingFlux = name;
    renderFluxTemplateEditor();
  });
  host.querySelectorAll('.flux-tab-del').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const flux = btn.dataset.flux;
    const ok = await customConfirm(`Supprimer le flux « ${flux} » et sa checklist ? Les projets ayant déjà ce flux le garderont, mais sans checklist associée.`, { okText:'Supprimer' });
    if(!ok) return;
    appOptions.customFlux = appOptions.customFlux.filter(f => f !== flux);
    saveAppOptions();
    delete checklistTemplates[flux];
    saveChecklistTemplates();
    if(editingFlux === flux) editingFlux = null;
    renderFluxTemplateEditor();
  }));

  if(!editingFlux) return;
  const t = getFluxTemplate(editingFlux);

  const blankBtn = $('#fluxBlankChecklistBtn');
  if(blankBtn) blankBtn.addEventListener('click', () => downloadBlankChecklist(editingFlux));

  host.querySelectorAll('.flux-partie-title').forEach(inp => inp.addEventListener('input', () => {
    t[+inp.dataset.p].title = inp.value;
    scheduleSaveChecklistTemplates();
  }));
  host.querySelectorAll('.flux-section-title').forEach(inp => inp.addEventListener('input', () => {
    t[+inp.dataset.p].sections[+inp.dataset.s].title = inp.value;
    scheduleSaveChecklistTemplates();
  }));
  host.querySelectorAll('.flux-item-text').forEach(inp => inp.addEventListener('input', () => {
    t[+inp.dataset.p].sections[+inp.dataset.s].items[+inp.dataset.i] = inp.value;
    scheduleSaveChecklistTemplates();
  }));

  host.querySelectorAll('.flux-partie-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer cette partie et tout son contenu ?', { okText:'Supprimer' });
    if(!ok) return;
    t.splice(+btn.dataset.p, 1);
    saveChecklistTemplates();
    renderFluxTemplateEditor();
  }));
  host.querySelectorAll('.flux-section-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer cette sous-partie et ses points ?', { okText:'Supprimer' });
    if(!ok) return;
    t[+btn.dataset.p].sections.splice(+btn.dataset.s, 1);
    saveChecklistTemplates();
    renderFluxTemplateEditor();
  }));
  host.querySelectorAll('.flux-item-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer ce point ?', { okText:'Supprimer' });
    if(!ok) return;
    t[+btn.dataset.p].sections[+btn.dataset.s].items.splice(+btn.dataset.i, 1);
    saveChecklistTemplates();
    renderFluxTemplateEditor();
  }));

  host.querySelectorAll('.flux-item-add-btn').forEach(btn => btn.addEventListener('click', () => {
    const input = host.querySelector(`.flux-item-add-input[data-p="${btn.dataset.p}"][data-s="${btn.dataset.s}"]`);
    const val = input.value.trim();
    if(!val) return;
    t[+btn.dataset.p].sections[+btn.dataset.s].items.push(val);
    saveChecklistTemplates();
    renderFluxTemplateEditor();
  }));
  host.querySelectorAll('.flux-item-add-input').forEach(inp => inp.addEventListener('keydown', e => { if(e.key === 'Enter') host.querySelector(`.flux-item-add-btn[data-p="${inp.dataset.p}"][data-s="${inp.dataset.s}"]`).click(); }));

  host.querySelectorAll('.flux-section-add-btn').forEach(btn => btn.addEventListener('click', () => {
    const input = host.querySelector(`.flux-section-add-input[data-p="${btn.dataset.p}"]`);
    const val = input.value.trim();
    if(!val) return;
    t[+btn.dataset.p].sections.push({ id: uid(), title: val, items: [] });
    saveChecklistTemplates();
    renderFluxTemplateEditor();
  }));
  host.querySelectorAll('.flux-section-add-input').forEach(inp => inp.addEventListener('keydown', e => { if(e.key === 'Enter') host.querySelector(`.flux-section-add-btn[data-p="${inp.dataset.p}"]`).click(); }));

  const partieAddBtn = $('#fluxPartieAddBtn');
  if(partieAddBtn){
    partieAddBtn.addEventListener('click', () => {
      const input = $('#fluxPartieAddInput');
      const val = input.value.trim();
      if(!val) return;
      t.push({ id: uid(), title: val, sections: [] });
      saveChecklistTemplates();
      renderFluxTemplateEditor();
    });
    $('#fluxPartieAddInput').addEventListener('keydown', e => { if(e.key === 'Enter') partieAddBtn.click(); });
  }
}

  function addValue(key){
    const input = sv.querySelector(`.settings-add-input[data-key="${key}"]`);
    const val = input.value.trim();
    if(!val) return;
    if(!appOptions[key]) appOptions[key] = [];
    if(appOptions[key].includes(val)){ showToast('Déjà présent dans la liste'); return; }
    appOptions[key].push(val);
    saveAppOptions();
    renderSettingsView();
  }

  function addValueGeneric(key){
    if(key === 'morningRoutine'){
      const input = sv.querySelector(`.settings-add-input[data-key="morningRoutine"]`);
      const val = input.value.trim();
      if(!val) return;
      morningRoutineItems.push({ id: uid(), text: val });
      saveMorningRoutineItems();
      renderSettingsView();
      return;
    }
    addValue(key);
  }
  sv.querySelectorAll('.settings-add-btn').forEach(btn => btn.addEventListener('click', () => addValueGeneric(btn.dataset.key)));
  sv.querySelectorAll('.settings-add-input').forEach(inp => inp.addEventListener('keydown', e => { if(e.key === 'Enter') addValueGeneric(inp.dataset.key); }));
  sv.querySelectorAll('.settings-del').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.key, idx = +btn.dataset.idx;
    if(key === 'morningRoutine'){
      morningRoutineItems.splice(idx, 1);
      saveMorningRoutineItems();
      renderSettingsView();
      return;
    }
    appOptions[key].splice(idx, 1);
    saveAppOptions();
    renderSettingsView();
  }));
  $('#previewRoutineBtn').addEventListener('click', openMorningRoutineModal);

  $('#poptAddBtn').addEventListener('click', () => openProjectOptionModal(null));
  $('#notesTextarea').addEventListener('input', e => { notesText = e.target.value; scheduleSaveNotes(); });
  $('#themeToggleBtn').addEventListener('click', () => {
    toggleTheme();
    $('#themeToggleBtn').textContent = appSettings.theme === 'dark' ? '☀️ Passer en mode clair' : '🌙 Passer en mode sombre';
  });
  $('#exportBtn').addEventListener('click', exportAllData);
  $('#importBtn').addEventListener('click', () => $('#importFileInput').click());
  $('#openManualBtn').addEventListener('click', openManualModal);
  $('#linkSeanceTodoToggle').addEventListener('change', e => {
    appSettings.linkSeanceTodo = e.target.checked;
    saveSettings();
    showToast(appSettings.linkSeanceTodo ? 'Liaison activée' : 'Liaison désactivée');
  });
  renderFluxTemplateEditor();
  $('#importFileInput').addEventListener('change', e => {
    const f = e.target.files[0];
    if(f) importAllData(f);
    e.target.value = '';
  });
  sv.querySelectorAll('.popt-edit').forEach(btn => btn.addEventListener('click', () => openProjectOptionModal(+btn.dataset.idx)));
  sv.querySelectorAll('.popt-del').forEach(btn => btn.addEventListener('click', async () => {
    const idx = +btn.dataset.idx;
    const o = appOptions.projectOptions[idx];
    const ok = await customConfirm(`Supprimer l'option « ${o.name} » ? Les projets qui l'avaient activée perdront ces étapes.`, { okText:'Supprimer' });
    if(!ok) return;
    appOptions.projectOptions.splice(idx, 1);
    saveAppOptions();
    renderSettingsView();
  }));
}

function openManualModal(){

function openProjectOptionModal(editIdx){
  const existing = (editIdx !== null && editIdx !== undefined) ? appOptions.projectOptions[editIdx] : null;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${existing ? 'Modifier l\u2019option' : 'Nouvelle option de projet'}</h3>
      <label>Nom de l'option</label>
      <input type="text" id="poptName" placeholder="ex. Tableau électrique" value="${existing ? escapeHtml(existing.name) : ''}">
      <label>Étapes associées (une par ligne)</label>
      <textarea id="poptItems" rows="6" style="width:100%;border:1px solid var(--line);border-radius:4px;padding:9px 10px;font-size:13px;font-family:var(--font-body);background:var(--paper);color:var(--graphite);resize:vertical;">${existing ? escapeHtml((existing.items||[]).join('\n')) : ''}</textarea>
      <div class="modal-actions">
        <button class="btn-text" id="poptCancel">Annuler</button>
        <button class="btn btn-primary" id="poptSave">${existing ? 'Enregistrer' : 'Créer l\u2019option'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#poptName').focus();
  function close(){ document.body.removeChild(backdrop); }
  backdrop.addEventListener('click', e => { if(e.target === backdrop) close(); });
  backdrop.querySelector('#poptCancel').addEventListener('click', close);
  backdrop.querySelector('#poptSave').addEventListener('click', () => {
    const name = backdrop.querySelector('#poptName').value.trim();
    const items = backdrop.querySelector('#poptItems').value.split('\n').map(s => s.trim()).filter(Boolean);
    if(!name){ showToast('Donne un nom à cette option'); return; }
    if(!appOptions.projectOptions) appOptions.projectOptions = [];
    if(existing){
      existing.name = name;
      existing.items = items;
    } else {
      appOptions.projectOptions.push({ id: uid(), name, items });
    }
    close();
    saveAppOptions();
    renderSettingsView();
  });
  backdrop.addEventListener('keydown', e => { if(e.key === 'Escape'){ close(); } });
}

/* ============================= PROJECT LIFECYCLE ============================= */

async function createProject(formVals, activeOptions){
  const p = Object.assign({
    id: uid(), name: 'Nouveau projet', client: '', numCommande: '', numFlux: '', coordinateur: '',
    date: new Date().toISOString().slice(0,10),
    echeance: '',
    createdAt: Date.now()
  }, formVals || {});
  projects.unshift(p);
  await saveProjects();
  lsSet('project:' + p.id, JSON.stringify({ checklist:{}, fiche:{}, fichePhotos:[], collapsed:{}, activeOptions: activeOptions || {}, generalNotes:'', customChecklist:[], planning: defaultPlanningData(), lastModified:Date.now() }));
  await openProject(p.id);
  showToast('Projet créé');
}

async function duplicateProject(){
  const p = projects.find(x => x.id === currentProjectId);
  if(!p) return;
  const ok = await customConfirm(`Créer un nouveau projet à partir de « ${escapeHtml(p.name)} » ? Le flux, le coordinateur et les options de projet seront repris ; la checklist, la fiche et les notes repartiront à zéro.`, { okText:'Dupliquer', danger:false });
  if(!ok) return;
  const newP = {
    id: uid(), name: (p.name || 'Projet') + ' (copie)', client: p.client || '', numCommande: '',
    coordinateur: p.coordinateur || '', numFlux: p.numFlux || '',
    date: new Date().toISOString().slice(0,10),
    echeance: '',
    createdAt: Date.now(), finished:false, archived:false
  };
  projects.unshift(newP);
  saveProjects();
  const newData = {
    checklist:{}, fiche:{}, fichePhotos:[], collapsed:{},
    activeOptions: JSON.parse(JSON.stringify((currentData && currentData.activeOptions) || {})),
    generalNotes:'', customChecklist:[], planning: defaultPlanningData(), lastModified: Date.now()
  };
  lsSet('project:' + newP.id, JSON.stringify(newData));
  await openProject(newP.id);
  showToast('Projet dupliqué comme modèle');
}

async function openProject(id){
  await flushAllPending();
  currentProjectId = id;
  currentData = await loadProjectData(id);
  if(!currentData.fichePhotos) currentData.fichePhotos = [];
  if(!currentData.activeOptions) currentData.activeOptions = {};
  if(!currentData.customChecklist) currentData.customChecklist = [];
  if(currentData.generalNotes === undefined) currentData.generalNotes = '';
  if(!currentData.planning) currentData.planning = defaultPlanningData();
  {
    const p = projects.find(x => x.id === id);
    if(p){
      if(!currentData.fiche.client && p.client) currentData.fiche.client = p.client;
      if(!currentData.fiche['num-au'] && p.numCommande) currentData.fiche['num-au'] = p.numCommande;
      syncEcheanceFromPlanning(p, currentData);
    }
  }
  currentView = 'project';
  currentTab = 'checklist';
  searchQuery = '';
  statusFilter = 'all';
  hideAllViews();
  $('#projectView').style.display = 'flex';
  $('#projectView').style.flexDirection = 'column';
  $('#projectView').style.height = '100%';
  renderProjectHeader();
  renderTabs();
  await renderSidebar();
}

async function deleteCurrentProject(){
  if(!currentProjectId) return;
  const p = projects.find(x => x.id === currentProjectId);
  const ok = await customConfirm(`Supprimer définitivement le projet « ${p ? p.name : ''} » et toutes ses données (checklist, fiche, photos) ?`, { okText:'Supprimer' });
  if(!ok) return;
  lsDelete('project:' + currentProjectId);
  delete projectStatsCache[currentProjectId];
  projects = projects.filter(x => x.id !== currentProjectId);
  await saveProjects();
  currentProjectId = null;
  currentData = null;
  await renderDashboardView();
  showToast('Projet supprimé');
}

function populateOptionSelect(selectEl, list, currentVal){
  const opts = ['<option value="">—</option>'];
  const set = new Set(list);
  if(currentVal && !set.has(currentVal)) opts.push(`<option value="${escapeHtml(currentVal)}">${escapeHtml(currentVal)} (hors liste)</option>`);
  list.forEach(v => opts.push(`<option value="${escapeHtml(v)}" ${v===currentVal?'selected':''}>${escapeHtml(v)}</option>`));
  selectEl.innerHTML = opts.join('');
  selectEl.value = currentVal || '';
}

function fitTitleText(){
  const el = $('#projTitleDisplay');
  if(!el || !el.parentElement) return;
  const maxWidth = el.parentElement.clientWidth;
  if(!maxWidth) return;
  let fontSize = 26;
  el.style.fontSize = fontSize + 'px';
  while(el.scrollWidth > maxWidth && fontSize > 13){
    fontSize -= 1;
    el.style.fontSize = fontSize + 'px';
  }
}
window.addEventListener('resize', () => { if(currentView === 'project') fitTitleText(); });

function formatEcheanceLabel(p){
  if(!p.echeance) return '—';
  return new Date(p.echeance).toLocaleDateString('fr-FR');
}

function formatRelativeTime(ts){
  if(!ts) return '—';
  const days = Math.floor((Date.now() - ts) / 86400000);
  if(days <= 0) return "aujourd'hui";
  if(days === 1) return 'hier';
  if(days < 30) return `il y a ${days}j`;
  return new Date(ts).toLocaleDateString('fr-FR');
}

function renderProjectHeader(){
  const p = projects.find(x => x.id === currentProjectId);
  if(!p) return;
  const titleEl = $('#projTitleDisplay');
  titleEl.textContent = p.name || 'Sans nom';
  titleEl.title = p.name || 'Sans nom';
  fitTitleText();

  const finBtn = $('#toggleFinishedBtn');
  finBtn.textContent = p.finished ? '↺' : '✓';
  finBtn.title = p.finished ? 'Rouvrir le projet' : 'Marquer comme terminé';
  finBtn.classList.toggle('active-finished', !!p.finished);

  const archBtn = $('#toggleArchivedBtn');
  archBtn.textContent = p.archived ? '↩' : '📦';
  archBtn.title = p.archived ? 'Désarchiver le projet' : 'Archiver le projet';
  archBtn.classList.toggle('active-finished', !!p.archived);

  const checklistApplicable = fluxHasChecklist(p.numFlux);
  $('#tabBtnChecklist').style.display = checklistApplicable ? 'flex' : 'none';
  if(!checklistApplicable && currentTab === 'checklist'){
    currentTab = 'fiche';
  }

  const parts = [
    ['Client', p.client], ['N° commande', p.numCommande], ['Coordinateur', p.coordinateur],
    ['Flux', p.numFlux], ['Créé le', p.date ? new Date(p.date).toLocaleDateString('fr-FR') : ''],
    ['Échéance', p.echeance ? formatEcheanceLabel(p) : ''],
    ['Dernière modif.', currentData && currentData.lastModified ? formatRelativeTime(currentData.lastModified) : '']
  ];
  const badges = (p.finished ? '<span class="badge done" style="margin-right:6px;">✓ Terminé</span>' : '') +
                 (p.archived ? '<span class="badge stalled" style="margin-right:8px;">📦 Archivé</span>' : '');
  $('#phSummary').innerHTML = badges + parts.map(([label, val], i) =>
    `<span class="phs-item"><b>${label} :</b> ${escapeHtml(val || '—')}</span>${i < parts.length-1 ? '<span class="phs-sep">·</span>' : ''}`
  ).join('');

  updateChecklistTabCount();
}

function getCurrentProjectFlux(){
  const p = projects.find(x => x.id === currentProjectId);
  return p ? p.numFlux : null;
}

function updateChecklistTabCount(){
  const flux = getCurrentProjectFlux();
  const checked = countChecked(currentData, flux);
  const total = projectTotalItems(currentData, flux);
  $('#tabCountChecklist').textContent = `${checked}/${total}`;
}

  const p = Object.assign({}, base);
  p.client = backdrop.querySelector('#pfClient').value.trim();
  p.numCommande = backdrop.querySelector('#pfNumCommande').value.trim();
  p.name = backdrop.querySelector('#pfName').value.trim() || 'Nouveau projet';
  p.coordinateur = backdrop.querySelector('#pfCoord').value;
  p.numFlux = backdrop.querySelector('#pfFlux').value;
  const activeOptions = {};
  backdrop.querySelectorAll('.pf-opt-check').forEach(cb => { activeOptions[cb.dataset.opt] = cb.checked; });
  return { p, activeOptions };
}

function openProjectFormModal(existingProject){
  const isEdit = !!existingProject;
  const activeOptionsMap = isEdit ? (currentData && currentData.activeOptions) || {} : {};
  const base = isEdit ? existingProject : { date: new Date().toISOString().slice(0,10), createdAt: Date.now() };

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? 'Modifier les informations' : 'Nouveau projet'}</h3>
      <div class="modal-scroll">${buildProjectFormFieldsHtml(base, activeOptionsMap)}</div>
      <div class="modal-actions">
        <button class="btn-text" id="pfCancel">Annuler</button>
        <button class="btn btn-primary" id="pfSave">${isEdit ? 'Enregistrer' : 'Créer le projet'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  wireProjectFormFields(backdrop, base);
  backdrop.querySelector('#pfClient').focus();

  function close(){ document.body.removeChild(backdrop); }
  backdrop.addEventListener('click', e => { if(e.target === backdrop) close(); });
  backdrop.querySelector('#pfCancel').addEventListener('click', close);
  backdrop.addEventListener('keydown', e => { if(e.key === 'Escape') close(); });

  backdrop.querySelector('#pfSave').addEventListener('click', async () => {
    const { p: formVals, activeOptions } = readProjectFormValues(backdrop, base);
    close();
    if(isEdit){
      Object.assign(existingProject, formVals);
      if(currentData){
        currentData.activeOptions = activeOptions;
        scheduleSaveProjectData();
      }
      await saveProjects();
      renderProjectHeader();
      renderTabs();
      await renderSidebar();
      showToast('Informations mises à jour');
    } else {
      await createProject(formVals, activeOptions);
    }
  });
}

$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => { currentTab = btn.dataset.tab; renderTabs(); });
});

function renderTabs(){
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  if(currentTab === 'checklist') renderChecklistTab();

/* ============================= CHECKLIST TAB ============================= */

function itemMatchesSearch(label, note){
  if(!searchQuery) return true;
  const nq = normalize(searchQuery);
  return normalize(label).includes(nq) || normalize(note || '').includes(nq);
}
function itemMatchesStatus(checked){
  if(statusFilter === 'all') return true;
  if(statusFilter === 'todo') return !checked;
  return checked;
}

function renderChecklistTab(){
  const container = $('#tabContent');
  const flux = getCurrentProjectFlux();

  if(!fluxHasChecklist(flux)){
    container.innerHTML = `
      <div class="no-results" style="padding:60px 20px;">
        <div style="font-size:34px;margin-bottom:10px;">🚧</div>
        <p style="margin:0 0 4px;font-weight:600;color:var(--graphite);">Aucune checklist disponible pour le flux « ${escapeHtml(flux || '—')} » pour l'instant.</p>
        <p style="margin:0;">Ajoute des points pour ce flux dans Réglages → Checklists par flux.</p>
      </div>`;
    return;
  }

  const filtering = !!searchQuery || statusFilter !== 'all';

  const hadFocus = document.activeElement && document.activeElement.id === 'checklistSearch';
  const caret = hadFocus ? document.activeElement.selectionStart : null;

  const parties = projectTemplate(currentData, flux).map(partie => {
    let partieChecked = 0, partieTotal = 0;
    const sectionBlocks = partie.sections.map(sec => {
      let secChecked = 0;
      const visibleItems = [];
      sec.items.forEach((label, idx) => {
        const k = itemKey(sec.id, idx);
        const st = currentData.checklist[k] || { checked:false, note:'', photos:[] };
        if(st.checked){ secChecked++; partieChecked++; }
        partieTotal++;
        if(itemMatchesSearch(label, st.note) && itemMatchesStatus(st.checked)){
          const itemExpanded = expandedItemIds.has(k);
          const hasNote = !!(st.note && st.note.trim());
          const hasPhotos = !!(st.photos && st.photos.length);
          visibleItems.push(`
            <div class="item-row ${st.checked?'done':''}" data-key="${k}">
              <input type="checkbox" class="item-check" ${st.checked?'checked':''} data-key="${k}">
              <div class="item-main">
                <div class="item-label-row" data-item-toggle="${k}">
                  <div class="item-label" data-key="${k}">${escapeHtml(label)}</div>
                  ${hasNote?'<span class="item-badge" title="A une note">🗒</span>':''}
                  ${hasPhotos?'<span class="item-badge" title="A des photos">📷</span>':''}
                  <span class="item-expand-chev">${itemExpanded?'▾':'▸'}</span>
                </div>
                ${itemExpanded ? `
                  ${noteBlockHtml(k, st.note, 'item-note', `data-key="${k}"`)}
                  ${photoBlockHtml(k, st.photos, 'data-key')}
                ` : ''}
              </div>
            </div>
          `);
        }
      });
      if(filtering && visibleItems.length === 0) return '';
      const collapsedKey = 'sec_' + sec.id;
      const isCollapsed = filtering ? false : !!currentData.collapsed[collapsedKey];
      return `
        <div class="section-block ${isCollapsed?'collapsed':''}" data-sec="${sec.id}">
          <div class="section-head" data-toggle-sec="${sec.id}">
            <h4><span class="chev-s">▾</span>${escapeHtml(sec.title)}</h4>
            <span class="sec-count">${secChecked}/${sec.items.length}</span>
          </div>
          <div class="section-items">${visibleItems.join('')}</div>
        </div>
      `;
    }).filter(Boolean);

    if(filtering && sectionBlocks.length === 0) return '';
    const collapsedKeyP = 'partie_' + partie.id;
    const isCollapsedP = filtering ? false : (currentData.collapsed[collapsedKeyP] !== false);
    const pct = partieTotal ? Math.round((partieChecked/partieTotal)*100) : 0;
    return `
      <div class="partie ${isCollapsedP?'collapsed':''}" data-partie="${partie.id}">
        <div class="partie-head" data-toggle-partie="${partie.id}">
          <h3><span class="chevron">▾</span> ${escapeHtml(partie.title)}</h3>
          <div class="partie-progress">
            <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
            ${partieChecked}/${partieTotal}
          </div>
        </div>
        <div class="partie-body">${sectionBlocks.join('')}</div>
      </div>
    `;
  }).filter(Boolean);

  const toolbarHtml = `
    <div class="checklist-toolbar">
      <input type="text" id="checklistSearch" placeholder="Rechercher un point de la checklist…" value="${escapeHtml(searchQuery)}">
      <div class="filter-pills">
        <button class="pill ${statusFilter==='all'?'active':''}" data-filter="all">Tous</button>
        <button class="pill ${statusFilter==='todo'?'active':''}" data-filter="todo">À faire</button>
        <button class="pill ${statusFilter==='done'?'active':''}" data-filter="done">Fait</button>
      </div>
    </div>
  `;

  const bodyHtml = parties.length ? parties.join('') : (filtering ? '<div class="no-results">Aucun point ne correspond à la recherche / au filtre.</div>' : '');
  container.innerHTML = toolbarHtml + bodyHtml;

  if(hadFocus){
    const si = $('#checklistSearch');
    si.focus();
    if(caret !== null) si.setSelectionRange(caret, caret);
  }

  $('#checklistSearch').addEventListener('input', e => { searchQuery = e.target.value; renderChecklistTab(); });
  $$('.pill').forEach(btn => btn.addEventListener('click', () => { statusFilter = btn.dataset.filter; renderChecklistTab(); }));

  $$('[data-toggle-partie]').forEach(el => el.addEventListener('click', () => {
    const key = 'partie_' + el.dataset.togglePartie;
    const currentlyCollapsed = currentData.collapsed[key] !== false;
    currentData.collapsed[key] = currentlyCollapsed ? false : true;
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('[data-toggle-sec]').forEach(el => el.addEventListener('click', () => {
    const key = 'sec_' + el.dataset.toggleSec;
    currentData.collapsed[key] = !currentData.collapsed[key];
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('.item-check').forEach(cb => cb.addEventListener('change', () => {
    const k = cb.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    currentData.checklist[k].checked = cb.checked;
    updateChecklistTabCount();
    scheduleSaveProjectData();
    renderSidebar();
    renderChecklistTab();
  }));
  $$('[data-item-toggle]').forEach(row => row.addEventListener('click', () => {
    const k = row.dataset.itemToggle;
    if(expandedItemIds.has(k)) expandedItemIds.delete(k); else expandedItemIds.add(k);
    renderChecklistTab();
  }));
  $$('.item-note').forEach(ta => ta.addEventListener('input', () => {
    const k = ta.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    currentData.checklist[k].note = ta.value;
    scheduleSaveProjectData();
  }));
  $$('.photo-input').forEach(inp => inp.addEventListener('change', async e => {
    const file = e.target.files[0];
    if(!file) return;
    const k = inp.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    if(!currentData.checklist[k].photos) currentData.checklist[k].photos = [];
    if(currentData.checklist[k].photos.length >= 3){ showToast('Maximum 3 photos par point'); return; }
    try{
      const dataUrl = await compressImage(file);
      currentData.checklist[k].photos.push(dataUrl);
      if(!dataSizeOk(currentData)){
        currentData.checklist[k].photos.pop();
        showToast('Limite de stockage atteinte — photo non ajoutée');
        return;
      }
      scheduleSaveProjectData();
      renderChecklistTab();
    }catch(err){ showToast('Impossible de charger la photo'); }
  }));
  $$('.photo-del').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const ok = await customConfirm('Supprimer cette photo ?', { okText:'Supprimer' });
    if(!ok) return;
    const k = btn.dataset.key, idx = +btn.dataset.idx;
    currentData.checklist[k].photos.splice(idx, 1);
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('.photo-thumb img').forEach(img => img.addEventListener('click', e => { e.stopPropagation(); showLightbox(img.src); }));
  wireNoteToggles(container, renderChecklistTab);
  wirePhotoToggles(container, renderChecklistTab);
}

function renderFicheGallery(){
  const photos = currentData.fichePhotos || [];
  const items = photos.map((ph, i) => `
    <div class="fg-item">
      <img src="${ph.dataUrl}" data-idx="${i}" class="fg-img">
      <button class="fg-del" data-idx="${i}">×</button>
      <input type="text" class="fg-caption" data-idx="${i}" placeholder="Légende…" value="${escapeHtml(ph.caption||'')}">
    </div>
  `).join('');
  return `
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>📷 Photos du site</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <div class="fg-grid">
          ${items}
          <label class="fg-add">📷<span>Ajouter une photo</span><input type="file" accept="image/*" capture="environment" id="ficheGalleryInput" hidden></label>
        </div>
      </div>
    </div>
  `;
}

function choicesFieldHtml(f, val){
  val = val || {};
  const selected = val.selected || {};
  const chips = f.choices.map(c => `
    <label class="choice-chip">
      <input type="checkbox" class="choice-check" data-fid="${f.id}" data-choice="${escapeHtml(c)}" ${selected[c] ? 'checked':''}>
      ${escapeHtml(c)}
    </label>
  `).join('');
  const autreChecked = !!val.autre;
  return `
    <div class="choices-field" data-fid="${f.id}">
      <div class="choices-row">
        ${chips}
        <label class="choice-chip">
          <input type="checkbox" class="choice-autre-check" data-fid="${f.id}" ${autreChecked?'checked':''}>
          Autre
        </label>
      </div>
      ${autreChecked ? `<textarea class="choice-autre-note" data-fid="${f.id}" placeholder="Précision…">${escapeHtml(val.autreNote||'')}</textarea>` : ''}
    </div>
  `;
}

function doorsFieldHtml(f, val){
  val = val || {};
  const count = val.count || 0;
  const doors = val.doors || [];
  const rows = [];
  for(let i = 0; i < count; i++){
    const d = doors[i] || { dimension:'', note:'' };
    rows.push(`
      <div class="door-card">
        <div class="door-card-title">Porte ${i+1}</div>
        <div class="door-card-fields">
          <div class="door-field-group">
            <label>Dimensions</label>
            <input type="text" class="door-dim" data-fid="${f.id}" data-idx="${i}" placeholder="ex. 120 x 210 cm" value="${escapeHtml(d.dimension||'')}">
          </div>
          <div class="door-field-group">
            <label>Note</label>
            <input type="text" class="door-note" data-fid="${f.id}" data-idx="${i}" placeholder="ex. porte d'entrée" value="${escapeHtml(d.note||'')}">
          </div>
        </div>
      </div>
    `);
  }
  return `
    <div class="doors-field" data-fid="${f.id}">
      <div class="doors-count-row">
        <label>Nombre de portes</label>
        <input type="number" class="doors-count-input" data-fid="${f.id}" min="0" step="1" value="${count}">
      </div>
      <div class="doors-list">${rows.join('') || '<div class="settings-empty">Indique un nombre de portes pour générer les champs.</div>'}</div>
    </div>
  `;
}

function renderFicheTab(){
  const container = $('#tabContent');
  const fieldSectionsHtml = FICHE_TEMPLATE.map(sec => {
    const fieldsHtml = sec.fields.map(f => {
      let control = '';
      if(f.type === 'choices'){
        control = choicesFieldHtml(f, currentData.fiche[f.id]);
      } else if(f.type === 'doors'){
        control = doorsFieldHtml(f, currentData.fiche[f.id]);
      } else {
        const val = currentData.fiche[f.id] || '';
        if(f.type === 'textarea'){
          control = `<textarea data-fid="${f.id}">${escapeHtml(val)}</textarea>`;
        } else if(f.type === 'select'){
          const opts = f.options.map(o => `<option value="${escapeHtml(o)}" ${o===val?'selected':''}>${o===''?'—':escapeHtml(o)}</option>`).join('');
          control = `<select data-fid="${f.id}">${opts}</select>`;
        } else {
          control = `<input type="text" data-fid="${f.id}" value="${escapeHtml(val)}">`;
        }
      }
      const boxed = (f.type === 'choices' || f.type === 'doors') ? 'fiche-field-boxed' : '';
      return `<div class="fiche-field ${f.wide?'wide':''} ${boxed}"><label>${escapeHtml(f.label)}</label>${control}</div>`;
    }).join('');
    return `<div class="fiche-section"><div class="fiche-section-head"><h4>${escapeHtml(sec.title)}</h4></div><div class="fiche-fields">${fieldsHtml}</div></div>`;
  }).join('');

  container.innerHTML = renderFicheGallery() + fieldSectionsHtml;

  const galleryInput = $('#ficheGalleryInput');
  if(galleryInput){
    galleryInput.addEventListener('change', async e => {
      const file = e.target.files[0];
      if(!file) return;
      if(!currentData.fichePhotos) currentData.fichePhotos = [];
      if(currentData.fichePhotos.length >= 8){ showToast('Maximum 8 photos dans la galerie'); return; }
      try{
        const dataUrl = await compressImage(file);
        currentData.fichePhotos.push({ dataUrl, caption:'' });
        if(!dataSizeOk(currentData)){
          currentData.fichePhotos.pop();
          showToast('Limite de stockage atteinte — photo non ajoutée');
          return;
        }
        scheduleSaveProjectData();
        renderFicheTab();
      }catch(err){ showToast('Impossible de charger la photo'); }
    });
  }
  $$('.fg-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer cette photo ?', { okText:'Supprimer' });
    if(!ok) return;
    currentData.fichePhotos.splice(+btn.dataset.idx, 1);
    scheduleSaveProjectData();
    renderFicheTab();
  }));
  $$('.fg-caption').forEach(inp => inp.addEventListener('input', () => {
    currentData.fichePhotos[+inp.dataset.idx].caption = inp.value;
    scheduleSaveProjectData();
  }));
  $$('.fg-img').forEach(img => img.addEventListener('click', () => showLightbox(img.src)));

  container.querySelectorAll('.choice-check').forEach(cb => cb.addEventListener('change', () => {
    const fid = cb.dataset.fid;
    if(!currentData.fiche[fid] || typeof currentData.fiche[fid] !== 'object') currentData.fiche[fid] = { selected:{}, autre:false, autreNote:'' };
    if(!currentData.fiche[fid].selected) currentData.fiche[fid].selected = {};
    currentData.fiche[fid].selected[cb.dataset.choice] = cb.checked;
    scheduleSaveProjectData();
  }));
  container.querySelectorAll('.choice-autre-check').forEach(cb => cb.addEventListener('change', () => {
    const fid = cb.dataset.fid;
    if(!currentData.fiche[fid] || typeof currentData.fiche[fid] !== 'object') currentData.fiche[fid] = { selected:{}, autre:false, autreNote:'' };
    currentData.fiche[fid].autre = cb.checked;
    scheduleSaveProjectData();
    renderFicheTab();
  }));
  container.querySelectorAll('.choice-autre-note').forEach(ta => ta.addEventListener('input', () => {
    const fid = ta.dataset.fid;
    if(!currentData.fiche[fid]) currentData.fiche[fid] = { selected:{}, autre:true, autreNote:'' };
    currentData.fiche[fid].autreNote = ta.value;
    scheduleSaveProjectData();
  }));

  container.querySelectorAll('.doors-count-input').forEach(inp => inp.addEventListener('input', () => {
    const fid = inp.dataset.fid;
    let n = parseInt(inp.value, 10);
    if(isNaN(n) || n < 0) n = 0;
    if(n > 30) n = 30;
    if(!currentData.fiche[fid] || typeof currentData.fiche[fid] !== 'object') currentData.fiche[fid] = { count:0, doors:[] };
    currentData.fiche[fid].count = n;
    const doors = currentData.fiche[fid].doors || [];
    while(doors.length < n) doors.push({ dimension:'', note:'' });
    doors.length = n;
    currentData.fiche[fid].doors = doors;
    scheduleSaveProjectData();
    renderFicheTab();
  }));
  container.querySelectorAll('.door-dim').forEach(inp => inp.addEventListener('input', () => {
    const fid = inp.dataset.fid, idx = +inp.dataset.idx;
    currentData.fiche[fid].doors[idx].dimension = inp.value;
    scheduleSaveProjectData();
  }));
  container.querySelectorAll('.door-note').forEach(inp => inp.addEventListener('input', () => {
    const fid = inp.dataset.fid, idx = +inp.dataset.idx;
    currentData.fiche[fid].doors[idx].note = inp.value;
    scheduleSaveProjectData();
  }));

  container.querySelectorAll('[data-fid]').forEach(el => {
    if(el.tagName !== 'INPUT' && el.tagName !== 'SELECT' && el.tagName !== 'TEXTAREA') return;
    if(el.classList.contains('choice-check') || el.classList.contains('choice-autre-check') || el.classList.contains('choice-autre-note') ||
       el.classList.contains('doors-count-input') || el.classList.contains('door-dim') || el.classList.contains('door-note')) return;
    el.addEventListener('input', () => { currentData.fiche[el.dataset.fid] = el.value; scheduleSaveProjectData(); });
    if(el.tagName === 'SELECT'){
      el.addEventListener('change', () => { currentData.fiche[el.dataset.fid] = el.value; scheduleSaveProjectData(); });
    }
  });
}

/* ============================= PLANNING INTENTIONNEL TAB ============================= */

function renderPlanningTab(){
  const container = $('#tabContent');
  const planning = currentData.planning || (currentData.planning = defaultPlanningData());
  const plannedEcheance = computePlannedEcheance(planning);
  const spanWeeks = computePlanningSpanWeeks(planning);
  const realSpanWeeks = computeRealSpanWeeks(planning);

  const rowsHtml = planning.tasks.map((t, idx) => {
    const plannedEnd = addWeeksToDate(planning.startDate, (t.debut!==null&&t.debut!==''&&t.duree!==null&&t.duree!=='') ? (parseFloat(t.debut)+parseFloat(t.duree)) : null);
    const realEnd = addWeeksToDate(planning.startDate, (t.debutReel!==null&&t.debutReel!==''&&t.dureeReel!==null&&t.dureeReel!=='') ? (parseFloat(t.debutReel)+parseFloat(t.dureeReel)) : null);
    return `
      <tr data-idx="${idx}" draggable="true" class="pl-row">
        <td class="pl-drag-handle" title="Glisser pour réordonner">⠿</td>
        <td><input type="text" class="pl-label" data-idx="${idx}" value="${escapeHtml(t.label)}"></td>
        <td><input type="number" class="pl-num" data-idx="${idx}" data-field="debut" step="0.5" value="${t.debut===null?'':t.debut}"></td>
        <td><input type="number" class="pl-num" data-idx="${idx}" data-field="duree" step="0.5" value="${t.duree===null?'':t.duree}"></td>
        <td class="pl-computed">${plannedEnd ? plannedEnd.toLocaleDateString('fr-FR') : '—'}</td>
        <td><input type="number" class="pl-num pl-real" data-idx="${idx}" data-field="debutReel" step="0.5" value="${t.debutReel===null?'':t.debutReel}"></td>
        <td><input type="number" class="pl-num pl-real" data-idx="${idx}" data-field="dureeReel" step="0.5" value="${t.dureeReel===null?'':t.dureeReel}"></td>
        <td class="pl-computed">${realEnd ? realEnd.toLocaleDateString('fr-FR') : '—'}</td>
        <td><button class="pl-del" data-idx="${idx}" title="Supprimer">×</button></td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>📐 Paramètres du planning</h4></div>
      <div class="fiche-fields">
        <div class="fiche-field">
          <label>Date de début du projet</label>
          <input type="date" id="plStartDate" value="${planning.startDate || ''}">
        </div>
        <div class="fiche-field">
          <label>Échéance calculée</label>
          <input type="text" value="${plannedEcheance ? new Date(plannedEcheance).toLocaleDateString('fr-FR') : '— (renseigne Début/Durée)'}" disabled>
        </div>
        <div class="fiche-field wide">
          <label class="choice-chip" style="align-self:flex-start;">
            <input type="checkbox" id="plOverrideToggle" ${planning.echeanceOverride?'checked':''}>
            Forcer une date d'échéance manuelle
          </label>
        </div>
        ${planning.echeanceOverride!==null ? `
        <div class="fiche-field">
          <label>Échéance forcée</label>
          <input type="date" id="plOverrideDate" value="${planning.echeanceOverride || ''}">
        </div>` : ''}
      </div>
    </div>
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>🗓 Tâches du planning (en semaines depuis le début)</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <div class="pl-table-wrap">
          <table class="pl-table">
            <thead>
              <tr>
                <th></th>
                <th>Description des tâches</th>
                <th>Début<br><span class="pl-th-sub">planifié</span></th>
                <th>Durée<br><span class="pl-th-sub">planifiée</span></th>
                <th>Fin<br><span class="pl-th-sub">planifiée</span></th>
                <th>Début<br><span class="pl-th-sub">réel</span></th>
                <th>Durée<br><span class="pl-th-sub">réelle</span></th>
                <th>Fin<br><span class="pl-th-sub">réelle</span></th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <div class="flux-add-row" style="margin-top:12px;">
          <input type="text" id="plTaskAddInput" placeholder="Nouvelle tâche…">
          <button class="btn btn-primary" id="plTaskAddBtn">+ Ajouter une tâche</button>
        </div>
        <p class="settings-hint" style="margin-top:10px;">Portée planifiée : ${spanWeeks ? spanWeeks + ' semaines' : '—'} · Portée réelle : ${realSpanWeeks!==null ? realSpanWeeks + ' semaines' : 'pas encore de données réelles'}</p>
      </div>
    </div>
  `;

  function recomputeAndSave(){
    const p = projects.find(x => x.id === currentProjectId);
    if(p) syncEcheanceFromPlanning(p, currentData);
    saveProjects();
    scheduleSaveProjectData();
  }

  $('#plStartDate').addEventListener('input', e => {
    planning.startDate = e.target.value;
    recomputeAndSave();
    renderPlanningTab();
  });
  $('#plOverrideToggle').addEventListener('change', e => {
    planning.echeanceOverride = e.target.checked ? (plannedEcheance || new Date().toISOString().slice(0,10)) : null;
    recomputeAndSave();
    renderPlanningTab();
  });
  const overrideInput = $('#plOverrideDate');
  if(overrideInput){
    overrideInput.addEventListener('input', e => {
      planning.echeanceOverride = e.target.value;
      recomputeAndSave();
      renderPlanningTab();
    });
  }

  container.querySelectorAll('.pl-label').forEach(inp => inp.addEventListener('input', () => {
    planning.tasks[+inp.dataset.idx].label = inp.value;
    scheduleSaveProjectData();
  }));
  container.querySelectorAll('.pl-num').forEach(inp => inp.addEventListener('input', () => {
    const idx = +inp.dataset.idx, field = inp.dataset.field;
    const v = inp.value === '' ? null : parseFloat(inp.value);
    planning.tasks[idx][field] = (v === null || isNaN(v)) ? null : v;
    recomputeAndSave();
    // only refresh the computed date columns without a full re-render, to keep focus while typing
    const row = container.querySelector(`tr[data-idx="${idx}"]`);
    if(row){
      const t = planning.tasks[idx];
      const plannedEnd = addWeeksToDate(planning.startDate, (t.debut!==null&&t.duree!==null) ? (t.debut+t.duree) : null);
      const realEnd = addWeeksToDate(planning.startDate, (t.debutReel!==null&&t.dureeReel!==null) ? (t.debutReel+t.dureeReel) : null);
      const computedCells = row.querySelectorAll('.pl-computed');
      if(computedCells[0]) computedCells[0].textContent = plannedEnd ? plannedEnd.toLocaleDateString('fr-FR') : '—';
      if(computedCells[1]) computedCells[1].textContent = realEnd ? realEnd.toLocaleDateString('fr-FR') : '—';
    }
  }));
  container.querySelectorAll('.pl-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer cette tâche du planning ?', { okText:'Supprimer' });
    if(!ok) return;
    planning.tasks.splice(+btn.dataset.idx, 1);
    recomputeAndSave();
    renderPlanningTab();
  }));

  let dragSrcIdx = null;
  container.querySelectorAll('.pl-row').forEach(row => {
    row.addEventListener('dragstart', () => {
      dragSrcIdx = +row.dataset.idx;
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const targetIdx = +row.dataset.idx;
      if(dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const [moved] = planning.tasks.splice(dragSrcIdx, 1);
      planning.tasks.splice(targetIdx, 0, moved);
      dragSrcIdx = null;
      recomputeAndSave();
      renderPlanningTab();
    });
  });

  function addTask(){
    const input = $('#plTaskAddInput');
    const text = input.value.trim();
    if(!text) return;
    planning.tasks.push({ id: uid(), label: text, debut:null, duree:null, debutReel:null, dureeReel:null });
    input.value = '';
    recomputeAndSave();
    renderPlanningTab();
  }
  $('#plTaskAddBtn').addEventListener('click', addTask);
  $('#plTaskAddInput').addEventListener('keydown', e => { if(e.key === 'Enter') addTask(); });
}

function renderNotesTab(){
  const container = $('#tabContent');
  const notes = currentData.generalNotes || '';
  const items = currentData.customChecklist || [];
  const ordered = items.filter(it => !it.checked).concat(items.filter(it => it.checked));
  const ccChecked = items.filter(it => it.checked).length;
  const ccTotal = items.length;
  const ccPct = ccTotal === 0 ? 0 : Math.round((ccChecked / ccTotal) * 100);

  container.innerHTML = `
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>📝 Notes générales</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <textarea id="projNotesTextarea" class="notes-textarea" placeholder="Notes générales sur ce projet…">${escapeHtml(notes)}</textarea>
      </div>
    </div>
    <div class="fiche-section">
      <div class="fiche-section-head" style="display:flex;justify-content:space-between;align-items:center;">
        <h4>☑ Points complémentaires</h4>
        <span class="cc-progress">${ccChecked}/${ccTotal} points · ${ccPct}%</span>
      </div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <p class="settings-hint">Ajoute ici tout point spécifique à ce projet qui ne fait pas partie de la checklist standard. Coche-le une fois fait : il descend en bas de liste, en transparence, sans être supprimé.</p>
        <div class="seance-add-row">
          <input type="text" id="customChecklistNewItem" placeholder="Ajouter un point…">
          <button class="btn btn-primary" id="customChecklistAddBtn">+ Ajouter</button>
        </div>
        <div class="seance-list">
          ${ordered.length ? ordered.map(it => {
            const hasNote = !!(it.note && it.note.trim());
            const expanded = expandedItemIds.has(it.id);
            return `
            <div class="seance-item ${it.checked?'done':''}" data-id="${it.id}">
              <div class="seance-item-top">
                <input type="checkbox" class="seance-check" data-id="${it.id}" ${it.checked?'checked':''}>
                <span class="seance-text" data-id="${it.id}" contenteditable="true" spellcheck="false">${escapeHtml(it.text)}</span>
                ${hasNote?'<span class="item-badge" title="A une note">🗒</span>':''}
                <button class="seance-expand" data-id="${it.id}" title="Note">${expanded?'▾':'▸'}</button>
                <button class="seance-del" data-id="${it.id}" title="Supprimer">×</button>
              </div>
              ${expanded ? noteBlockHtml(it.id, it.note, 'seance-note', `data-id="${it.id}"`) : ''}
            </div>
          `; }).join('') : '<div class="settings-empty">Aucun point pour l\u2019instant.</div>'}
        </div>
      </div>
    </div>
  `;

  $('#projNotesTextarea').addEventListener('input', e => {
    currentData.generalNotes = e.target.value;
    scheduleSaveProjectData();
  });

  function addItem(){
    const input = $('#customChecklistNewItem');
    const text = input.value.trim();
    if(!text) return;
    if(!currentData.customChecklist) currentData.customChecklist = [];
    const p = projects.find(x => x.id === currentProjectId);
    if(appSettings.linkSeanceTodo){
      const linkId = uid();
      currentData.customChecklist.unshift({ id: uid(), text, checked:false, note:'', linkId });
      todoList.unshift({ id: uid(), text, checked:false, note:'', linkId, origin:'project', originProjectId: currentProjectId, originProjectName: p ? p.name : '' });
      scheduleSaveSeance('todo');
    } else {
      currentData.customChecklist.unshift({ id: uid(), text, checked:false, note:'' });
    }
    input.value = '';
    scheduleSaveProjectData();
    renderNotesTab();
  }
  $('#customChecklistAddBtn').addEventListener('click', addItem);
  $('#customChecklistNewItem').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });

  container.querySelectorAll('.seance-expand').forEach(btn => btn.addEventListener('click', () => {
    const itemId = btn.dataset.id;
    if(expandedItemIds.has(itemId)) expandedItemIds.delete(itemId); else expandedItemIds.add(itemId);
    renderNotesTab();
  }));
  container.querySelectorAll('.seance-check').forEach(cb => cb.addEventListener('change', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === cb.dataset.id);
    if(it){
      it.checked = cb.checked;
      if(it.linkId){ syncLinkedItems(it.linkId, { checked: it.checked }); saveAllLinkedLists(); }
    }
    scheduleSaveProjectData();
    renderNotesTab();
  }));
  container.querySelectorAll('.seance-del').forEach(btn => btn.addEventListener('click', async () => {
    const it = (currentData.customChecklist || []).find(x => x.id === btn.dataset.id);
    const ok = await customConfirm(it && it.linkId ? 'Supprimer ce point ? Sa copie dans la To do list sera supprimée aussi.' : 'Supprimer ce point ?', { okText:'Supprimer' });
    if(!ok) return;
    if(it && it.linkId){
      deleteLinkedItems(it.linkId);
      saveAllLinkedLists();
    }
    currentData.customChecklist = (currentData.customChecklist || []).filter(x => x.id !== btn.dataset.id);
    scheduleSaveProjectData();
    renderNotesTab();
  }));
  container.querySelectorAll('.seance-text').forEach(span => span.addEventListener('blur', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === span.dataset.id);
    const newText = span.textContent.trim();
    if(it && newText && it.text !== newText){
      it.text = newText;
      if(it.linkId){ syncLinkedItems(it.linkId, { text: newText }); saveAllLinkedLists(); }
      scheduleSaveProjectData();
    }
  }));
  container.querySelectorAll('.seance-note').forEach(ta => ta.addEventListener('input', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === ta.dataset.id);
    if(it){
      it.note = ta.value;
      if(it.linkId){ syncLinkedItems(it.linkId, { note: ta.value }); saveAllLinkedLists(); }
      scheduleSaveProjectData();
    }
  }));
  wireNoteToggles(container, renderNotesTab);
}

let reportSections = { checklist:true, fiche:true, notes:true };

function buildReportHtmlFragment(){
  const p = projects.find(x => x.id === currentProjectId);
  const flux = p ? p.numFlux : null;
  const checked = countChecked(currentData, flux);
  const total = projectTotalItems(currentData, flux);
  const pct = total ? Math.round((checked/total)*100) : 0;

  const checklistHtml = total ? projectTemplate(currentData, flux).map(partie => {
    const secs = partie.sections.map(sec => {
      const items = sec.items.map((label, idx) => {
        const k = itemKey(sec.id, idx);
        const st = currentData.checklist[k] || { checked:false, note:'', photos:[] };
        const photosHtml = (st.photos && st.photos.length) ? `<div class="rp-photos">${st.photos.map(ph=>`<img src="${ph}" class="rp-photo">`).join('')}</div>` : '';
        return `<div class="rp-item ${st.checked?'done':'pending'}">
          <div class="mark">${st.checked?'✓':'○'}</div>
          <div><div>${escapeHtml(label)}</div>${st.note?`<div class="note">${escapeHtml(st.note)}</div>`:''}</div>
          ${photosHtml}
        </div>`;
      }).join('');
      return `<h4 class="rp-h4">${escapeHtml(sec.title)}</h4>${items}`;
    }).join('');
    return `<h3 class="rp-h3">${escapeHtml(partie.title)}</h3>${secs}`;
  }).join('') : `<p style="color:var(--steel);font-style:italic;">Aucune checklist de planification disponible pour le flux « ${escapeHtml(flux || '—')} ».</p>`;

  function formatFicheFieldForReport(f, val){
    if(f.type === 'choices'){
      const selected = (val && val.selected) || {};
      const picked = (f.choices || []).filter(c => selected[c]);
      if(val && val.autre && val.autreNote) picked.push('Autre : ' + val.autreNote);
      else if(val && val.autre) picked.push('Autre');
      return picked.length ? escapeHtml(picked.join(', ')) : null;
    }
    if(f.type === 'doors'){
      const doors = (val && val.doors) || [];
      if(!doors.length) return null;
      return doors.map((d,i) => escapeHtml(`Porte ${i+1} : ${d.dimension || '—'}${d.note ? ' (' + d.note + ')' : ''}`)).join('<br>');
    }
    return val ? escapeHtml(val) : null;
  }

  const ficheHtml = FICHE_TEMPLATE.map(sec => {
    const rows = sec.fields.map(f => {
      const val = currentData.fiche[f.id];
      const formatted = formatFicheFieldForReport(f, val);
      return `<div class="rp-fiche-row"><b>${escapeHtml(f.label)} : </b><span class="val ${formatted?'':'empty'}">${formatted || 'non renseigné'}</span></div>`;
    }).join('');
    return `<h3 class="rp-h3">${escapeHtml(sec.title)}</h3>${rows}`;
  }).join('');

  const galleryPhotos = currentData.fichePhotos || [];
  const galleryHtml = galleryPhotos.length ? `
    <h3 class="rp-h3" style="background:var(--amber-dark)">PHOTOS DU SITE</h3>
    <div class="rp-gallery">
      ${galleryPhotos.map(ph => `<div class="rp-gallery-item"><img src="${ph.dataUrl}"><div class="rp-gallery-caption">${escapeHtml(ph.caption||'')}</div></div>`).join('')}
    </div>` : '';

  const genNotes = (currentData.generalNotes || '').trim();
  const ccItems = currentData.customChecklist || [];
  const notesHtml = (genNotes || ccItems.length) ? `
    <h3 class="rp-h3" style="background:var(--amber-dark)">NOTES GÉNÉRALES</h3>
    ${genNotes ? `<p style="white-space:pre-wrap;font-size:13px;color:var(--graphite);">${escapeHtml(genNotes)}</p>` : ''}
    ${ccItems.length ? `<h4 class="rp-h4">Points complémentaires</h4>${ccItems.map(it => `
      <div class="rp-item ${it.checked?'done':'pending'}">
        <div class="mark">${it.checked?'✓':'○'}</div>
        <div><div>${escapeHtml(it.text)}</div>${it.note?`<div class="note">${escapeHtml(it.note)}</div>`:''}</div>
      </div>`).join('')}` : ''}` : '';

  return `
    <h2 class="rp-title">${escapeHtml(p.name || 'Projet')}</h2>
    <div class="rp-sub">Rapport de projet — généré le ${new Date().toLocaleDateString('fr-FR')}</div>
    <div class="rp-meta-grid">
      <div><b>Client :</b> ${escapeHtml(p.client || '—')}</div>
      <div><b>N° de commande :</b> ${escapeHtml(p.numCommande || '—')}</div>
      <div><b>Flux :</b> ${escapeHtml(p.numFlux || '—')}</div>
      <div><b>Coordinateur :</b> ${escapeHtml(p.coordinateur || '—')}</div>
      <div><b>Date :</b> ${p.date ? new Date(p.date).toLocaleDateString('fr-FR') : '—'}</div>
      <div><b>Échéance :</b> ${p.echeance ? new Date(p.echeance).toLocaleDateString('fr-FR') : '—'}</div>
      ${reportSections.checklist ? `<div><b>Avancement checklist :</b> ${total ? `${checked}/${total} (${pct}%)` : 'Non applicable pour ce flux'}</div>` : ''}
    </div>
    ${reportSections.checklist ? `
      <h3 class="rp-h3" style="background:var(--amber-dark)">CHECKLIST DE PLANIFICATION</h3>
      ${checklistHtml}
    ` : ''}
    ${reportSections.fiche ? `
      <h3 class="rp-h3" style="background:var(--amber-dark)">FICHE DE VISITE DE CHANTIER</h3>
      ${ficheHtml}
      ${galleryHtml}
    ` : ''}
    ${reportSections.notes ? notesHtml : ''}
  `;
}

function renderRapportTab(){
  const container = $('#tabContent');
  const flux = getCurrentProjectFlux();
  const checked = countChecked(currentData, flux);
  const total = projectTotalItems(currentData, flux);
  const remaining = total - checked;
  let filledFiche = 0, totalFiche = 0;
  FICHE_TEMPLATE.forEach(s => s.fields.forEach(f => {
    totalFiche++;
    const val = currentData.fiche[f.id];
    let isFilled;
    if(f.type === 'choices'){
      isFilled = !!(val && ((val.selected && Object.values(val.selected).some(Boolean)) || val.autre));
    } else if(f.type === 'doors'){
      isFilled = !!(val && val.count > 0);
    } else {
      isFilled = !!val;
    }
    if(isFilled) filledFiche++;
  }));

  container.innerHTML = `
    <div class="report-sections-row">
      <span class="report-sections-label">Inclure dans le rapport :</span>
      <label class="choice-chip"><input type="checkbox" id="repSecChecklist" ${reportSections.checklist?'checked':''}> Checklist</label>
      <label class="choice-chip"><input type="checkbox" id="repSecFiche" ${reportSections.fiche?'checked':''}> Fiche de visite</label>
      <label class="choice-chip"><input type="checkbox" id="repSecNotes" ${reportSections.notes?'checked':''}> Notes générales</label>
    </div>
    <div id="reportActions">
      <button class="btn btn-primary" id="downloadReportBtn">⬇ Télécharger le rapport (HTML)</button>
      <button class="btn btn-ghost" id="printReportBtn">🖶 Imprimer / Enregistrer en PDF</button>
    </div>
    <div class="stat-strip">
      <div class="stat-box"><div class="n">${checked}/${total}</div><div class="l">Points cochés</div></div>
      <div class="stat-box"><div class="n">${remaining}</div><div class="l">Points restants</div></div>
      <div class="stat-box"><div class="n">${filledFiche}/${totalFiche}</div><div class="l">Champs fiche renseignés</div></div>
    </div>
    <div id="reportPreview">${buildReportHtmlFragment()}</div>
  `;
  $('#repSecChecklist').addEventListener('change', e => { reportSections.checklist = e.target.checked; $('#reportPreview').innerHTML = buildReportHtmlFragment(); });
  $('#repSecFiche').addEventListener('change', e => { reportSections.fiche = e.target.checked; $('#reportPreview').innerHTML = buildReportHtmlFragment(); });
  $('#repSecNotes').addEventListener('change', e => { reportSections.notes = e.target.checked; $('#reportPreview').innerHTML = buildReportHtmlFragment(); });
  $('#downloadReportBtn').addEventListener('click', downloadReport);
  $('#printReportBtn').addEventListener('click', () => window.print());
}

function downloadReport(){
  const p = projects.find(x => x.id === currentProjectId);
  const fragment = buildReportHtmlFragment();
  const styles = document.querySelector('style').innerHTML;
  const full = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Rapport — ${escapeHtml(p.name)}</title>
  <style>${styles}
  body{padding:40px;background:#fff;}
  #reportPreview{border:none;padding:0;max-width:820px;margin:0 auto;}
  </style></head><body><div id="reportPreview">${fragment}</div></body></html>`;
  const blob = new Blob([full], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (p.name || 'projet').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  a.href = url;
  a.download = `rapport_${safeName}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Rapport téléchargé');
}

/* ============================= EXPORT / IMPORT ALL DATA ============================= */

async function exportAllData(){
  await flushAllPending();
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    projects,
    projectData: {},
    seanceMatin,
    todoList,
    seanceOpeBoard,
    appOptions,
    checklistTemplates,
    notesText,
    appSettings,
    morningRoutineItems,
    morningRoutineState
  };
  for(const p of projects){
    payload.projectData[p.id] = (p.id === currentProjectId && currentData) ? currentData : await loadProjectData(p.id);
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gestion_de_projet_sauvegarde_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Sauvegarde complète exportée');
}

async function importAllData(file){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!payload || !Array.isArray(payload.projects)) throw new Error('format invalide');
    const ok = await customConfirm(`Importer ${payload.projects.length} projet(s) et toutes les autres données (séances, réglages, checklists par flux, bloc-notes) ? Elles remplaceront les données actuelles ayant le même identifiant.`, { okText:'Importer', danger:false });
    if(!ok) return;
    for(const p of payload.projects){
      const idx = projects.findIndex(x => x.id === p.id);
      if(idx >= 0) projects[idx] = p; else projects.push(p);
      const d = (payload.projectData && payload.projectData[p.id]) ? payload.projectData[p.id] : { checklist:{}, fiche:{}, fichePhotos:[], collapsed:{}, activeOptions:{}, generalNotes:'', customChecklist:[] };
      lsSet('project:' + p.id, JSON.stringify(d));
    }
    projectStatsCache = {};
    saveProjects();

    if(payload.seanceMatin){ seanceMatin = payload.seanceMatin; saveSeance('matin'); }
    if(payload.todoList){ todoList = payload.todoList; saveSeance('todo'); }
    if(payload.seanceOpeBoard){ seanceOpeBoard = payload.seanceOpeBoard; saveSeanceOpeBoard(); }
    if(payload.appOptions){
      appOptions = { coordinateurs: payload.appOptions.coordinateurs || [], flux: payload.appOptions.flux || [], projectOptions: payload.appOptions.projectOptions || [] };
      saveAppOptions();
    }
    if(payload.checklistTemplates){
      checklistTemplates = payload.checklistTemplates;
      saveChecklistTemplates();
    }
    if(typeof payload.notesText === 'string'){ notesText = payload.notesText; lsSet('projectNotes', notesText); }
    if(payload.appSettings){ appSettings = payload.appSettings; applyTheme(); saveSettings(); }
    if(payload.morningRoutineItems){ morningRoutineItems = payload.morningRoutineItems; saveMorningRoutineItems(); }
    if(payload.morningRoutineState){ morningRoutineState = payload.morningRoutineState; saveMorningRoutineState(); }

    currentProjectId = null;
    currentData = null;
    await renderDashboardView();
    showToast('Import terminé');
  }catch(e){
    showToast("Échec de l'import : fichier invalide");
  }
}

/* ============================= INIT ============================= */

async function init(){
  appSettings = loadSettings();
  applyTheme();
  appOptions = loadAppOptions();
  checklistTemplates = loadChecklistTemplates();
  notesText = loadNotes();
  seanceMatin = loadSeance('seance_matin');
  todoList = loadSeance('todo_list');
  seanceOpeBoard = loadSeanceOpeBoard();
  morningRoutineItems = loadMorningRoutineItems();
  if(!lsGet('morningRoutineV2Seeded')){
    const existingTexts = morningRoutineItems.map(it => it.text);
    DEFAULT_MORNING_ROUTINE.forEach(text => { if(!existingTexts.includes(text)) morningRoutineItems.push({ id: uid(), text }); });
    saveMorningRoutineItems();
    lsSet('morningRoutineV2Seeded', '1');
  }
  morningRoutineState = loadMorningRoutineState();
  loadProjects();
  await renderDashboardView();

  const todayStr = new Date().toISOString().slice(0,10);
  let showRoutineToday = false;
  if(morningRoutineState.date !== todayStr){
    morningRoutineState = { date: todayStr, checked:{}, snoozeUntil: null };
    saveMorningRoutineState();
    showRoutineToday = true;
  } else if(morningRoutineState.snoozeUntil && Date.now() >= morningRoutineState.snoozeUntil && !allRoutineChecked()){
    morningRoutineState.snoozeUntil = null;
    saveMorningRoutineState();
    showRoutineToday = true;
  }

  if(!lsGet('hasSeenManual')){
    lsSet('hasSeenManual', '1');
    openManualModal();
  } else if(showRoutineToday && morningRoutineItems.length && !allRoutineChecked()){
    openMorningRoutineModal();
  }
}
init();

window.addEventListener('beforeunload', () => {
  if(saveTimer) saveProjectDataNow();
  Object.keys(seanceSaveTimers).forEach(id => { if(seanceSaveTimers[id]) saveSeance(id); });
  if(opeSaveTimer){ clearTimeout(opeSaveTimer); saveSeanceOpeBoard(); }
  if(notesSaveTimer){ clearTimeout(notesSaveTimer); lsSet('projectNotes', notesText); }
});
</script>
