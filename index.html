/* ============================= CHECKLIST TAB ============================= */

function itemMatchesSearch(label, note){
  if(!searchQuery) return true;
  const nq = normalize(searchQuery);
  return normalize(label).includes(nq) || normalize(note || '').includes(nq);
}
function itemMatchesStatus(checked){
  if(statusFilter === 'all') return true;
  if(statusFilter === 'todo') return !checked;
  return checked;
}

function renderChecklistTab(){
  const container = $('#tabContent');
  const flux = getCurrentProjectFlux();

  if(!fluxHasChecklist(flux)){
    container.innerHTML = `
      <div class="no-results" style="padding:60px 20px;">
        <div style="font-size:34px;margin-bottom:10px;">🚧</div>
        <p style="margin:0 0 4px;font-weight:600;color:var(--graphite);">Aucune checklist disponible pour le flux « ${escapeHtml(flux || '—')} » pour l'instant.</p>
        <p style="margin:0;">Ajoute des points pour ce flux dans Réglages → Checklists par flux.</p>
      </div>`;
    return;
  }

  const filtering = !!searchQuery || statusFilter !== 'all';

  const hadFocus = document.activeElement && document.activeElement.id === 'checklistSearch';
  const caret = hadFocus ? document.activeElement.selectionStart : null;

  const parties = projectTemplate(currentData, flux).map(partie => {
    let partieChecked = 0, partieTotal = 0;
    const sectionBlocks = partie.sections.map(sec => {
      let secChecked = 0;
      const visibleItems = [];
      sec.items.forEach((label, idx) => {
        const k = itemKey(sec.id, idx);
        const st = currentData.checklist[k] || { checked:false, note:'', photos:[] };
        if(st.checked){ secChecked++; partieChecked++; }
        partieTotal++;
        if(itemMatchesSearch(label, st.note) && itemMatchesStatus(st.checked)){
          visibleItems.push(`
            <div class="item-row ${st.checked?'done':''}" data-key="${k}">
              <input type="checkbox" class="item-check" ${st.checked?'checked':''} data-key="${k}">
              <div class="item-main">
                <div class="item-label" data-key="${k}">${escapeHtml(label)}</div>
                ${noteBlockHtml(k, st.note, 'item-note', `data-key="${k}"`)}
                ${photoBlockHtml(k, st.photos, 'data-key')}
              </div>
            </div>
          `);
        }
      });
      if(filtering && visibleItems.length === 0) return '';
      const collapsedKey = 'sec_' + sec.id;
      const isCollapsed = filtering ? false : !!currentData.collapsed[collapsedKey];
      return `
        <div class="section-block ${isCollapsed?'collapsed':''}" data-sec="${sec.id}">
          <div class="section-head" data-toggle-sec="${sec.id}">
            <h4><span class="chev-s">▾</span>${escapeHtml(sec.title)}</h4>
            <span class="sec-count">${secChecked}/${sec.items.length}</span>
          </div>
          <div class="section-items">${visibleItems.join('')}</div>
        </div>
      `;
    }).filter(Boolean);

    if(filtering && sectionBlocks.length === 0) return '';
    const collapsedKeyP = 'partie_' + partie.id;
    const isCollapsedP = filtering ? false : !!currentData.collapsed[collapsedKeyP];
    const pct = partieTotal ? Math.round((partieChecked/partieTotal)*100) : 0;
    return `
      <div class="partie ${isCollapsedP?'collapsed':''}" data-partie="${partie.id}">
        <div class="partie-head" data-toggle-partie="${partie.id}">
          <h3><span class="chevron">▾</span> ${escapeHtml(partie.title)}</h3>
          <div class="partie-progress">
            <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
            ${partieChecked}/${partieTotal}
          </div>
        </div>
        <div class="partie-body">${sectionBlocks.join('')}</div>
      </div>
    `;
  }).filter(Boolean);

  const toolbarHtml = `
    <div class="checklist-toolbar">
      <input type="text" id="checklistSearch" placeholder="Rechercher un point de la checklist…" value="${escapeHtml(searchQuery)}">
      <div class="filter-pills">
        <button class="pill ${statusFilter==='all'?'active':''}" data-filter="all">Tous</button>
        <button class="pill ${statusFilter==='todo'?'active':''}" data-filter="todo">À faire</button>
        <button class="pill ${statusFilter==='done'?'active':''}" data-filter="done">Fait</button>
      </div>
    </div>
  `;

  const bodyHtml = parties.length ? parties.join('') : (filtering ? '<div class="no-results">Aucun point ne correspond à la recherche / au filtre.</div>' : '');
  container.innerHTML = toolbarHtml + bodyHtml;

  if(hadFocus){
    const si = $('#checklistSearch');
    si.focus();
    if(caret !== null) si.setSelectionRange(caret, caret);
  }

  $('#checklistSearch').addEventListener('input', e => { searchQuery = e.target.value; renderChecklistTab(); });
  $$('.pill').forEach(btn => btn.addEventListener('click', () => { statusFilter = btn.dataset.filter; renderChecklistTab(); }));

  $$('[data-toggle-partie]').forEach(el => el.addEventListener('click', () => {
    const key = 'partie_' + el.dataset.togglePartie;
    currentData.collapsed[key] = !currentData.collapsed[key];
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('[data-toggle-sec]').forEach(el => el.addEventListener('click', () => {
    const key = 'sec_' + el.dataset.toggleSec;
    currentData.collapsed[key] = !currentData.collapsed[key];
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('.item-check').forEach(cb => cb.addEventListener('change', () => {
    const k = cb.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    currentData.checklist[k].checked = cb.checked;
    updateChecklistTabCount();
    scheduleSaveProjectData();
    renderSidebar();
    renderChecklistTab();
  }));
  $$('.item-label').forEach(lbl => lbl.addEventListener('click', () => {
    const k = lbl.dataset.key;
    const cb = document.querySelector(`.item-check[data-key="${k}"]`);
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  }));
  $$('.item-note').forEach(ta => ta.addEventListener('input', () => {
    const k = ta.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    currentData.checklist[k].note = ta.value;
    scheduleSaveProjectData();
  }));
  $$('.photo-input').forEach(inp => inp.addEventListener('change', async e => {
    const file = e.target.files[0];
    if(!file) return;
    const k = inp.dataset.key;
    if(!currentData.checklist[k]) currentData.checklist[k] = { checked:false, note:'', photos:[] };
    if(!currentData.checklist[k].photos) currentData.checklist[k].photos = [];
    if(currentData.checklist[k].photos.length >= 3){ showToast('Maximum 3 photos par point'); return; }
    try{
      const dataUrl = await compressImage(file);
      currentData.checklist[k].photos.push(dataUrl);
      if(!dataSizeOk(currentData)){
        currentData.checklist[k].photos.pop();
        showToast('Limite de stockage atteinte — photo non ajoutée');
        return;
      }
      scheduleSaveProjectData();
      renderChecklistTab();
    }catch(err){ showToast('Impossible de charger la photo'); }
  }));
  $$('.photo-del').forEach(btn => btn.addEventListener('click', async e => {
    e.stopPropagation();
    const ok = await customConfirm('Supprimer cette photo ?', { okText:'Supprimer' });
    if(!ok) return;
    const k = btn.dataset.key, idx = +btn.dataset.idx;
    currentData.checklist[k].photos.splice(idx, 1);
    scheduleSaveProjectData();
    renderChecklistTab();
  }));
  $$('.photo-thumb img').forEach(img => img.addEventListener('click', e => { e.stopPropagation(); showLightbox(img.src); }));
  wireNoteToggles(container, renderChecklistTab);
  wirePhotoToggles(container, renderChecklistTab);
}

/* ============================= FICHE TAB ============================= */

function renderFicheGallery(){
  const photos = currentData.fichePhotos || [];
  const items = photos.map((ph, i) => `
    <div class="fg-item">
      <img src="${ph.dataUrl}" data-idx="${i}" class="fg-img">
      <button class="fg-del" data-idx="${i}">×</button>
      <input type="text" class="fg-caption" data-idx="${i}" placeholder="Légende…" value="${escapeHtml(ph.caption||'')}">
    </div>
  `).join('');
  return `
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>📷 Photos du site</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <div class="fg-grid">
          ${items}
          <label class="fg-add">📷<span>Ajouter une photo</span><input type="file" accept="image/*" capture="environment" id="ficheGalleryInput" hidden></label>
        </div>
      </div>
    </div>
  `;
}

function renderFicheTab(){
  const container = $('#tabContent');
  const fieldSectionsHtml = FICHE_TEMPLATE.map(sec => {
    const fieldsHtml = sec.fields.map(f => {
      const val = currentData.fiche[f.id] || '';
      let control = '';
      if(f.type === 'textarea'){
        control = `<textarea data-fid="${f.id}">${escapeHtml(val)}</textarea>`;
      } else if(f.type === 'select'){
        const opts = f.options.map(o => `<option value="${escapeHtml(o)}" ${o===val?'selected':''}>${o===''?'—':escapeHtml(o)}</option>`).join('');
        control = `<select data-fid="${f.id}">${opts}</select>`;
      } else {
        control = `<input type="text" data-fid="${f.id}" value="${escapeHtml(val)}">`;
      }
      return `<div class="fiche-field ${f.wide?'wide':''}"><label>${escapeHtml(f.label)}</label>${control}</div>`;
    }).join('');
    return `<div class="fiche-section"><div class="fiche-section-head"><h4>${escapeHtml(sec.title)}</h4></div><div class="fiche-fields">${fieldsHtml}</div></div>`;
  }).join('');

  container.innerHTML = renderFicheGallery() + fieldSectionsHtml;

  const galleryInput = $('#ficheGalleryInput');
  if(galleryInput){
    galleryInput.addEventListener('change', async e => {
      const file = e.target.files[0];
      if(!file) return;
      if(!currentData.fichePhotos) currentData.fichePhotos = [];
      if(currentData.fichePhotos.length >= 8){ showToast('Maximum 8 photos dans la galerie'); return; }
      try{
        const dataUrl = await compressImage(file);
        currentData.fichePhotos.push({ dataUrl, caption:'' });
        if(!dataSizeOk(currentData)){
          currentData.fichePhotos.pop();
          showToast('Limite de stockage atteinte — photo non ajoutée');
          return;
        }
        scheduleSaveProjectData();
        renderFicheTab();
      }catch(err){ showToast('Impossible de charger la photo'); }
    });
  }
  $$('.fg-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer cette photo ?', { okText:'Supprimer' });
    if(!ok) return;
    currentData.fichePhotos.splice(+btn.dataset.idx, 1);
    scheduleSaveProjectData();
    renderFicheTab();
  }));
  $$('.fg-caption').forEach(inp => inp.addEventListener('input', () => {
    currentData.fichePhotos[+inp.dataset.idx].caption = inp.value;
    scheduleSaveProjectData();
  }));
  $$('.fg-img').forEach(img => img.addEventListener('click', () => showLightbox(img.src)));

  container.querySelectorAll('[data-fid]').forEach(el => {
    el.addEventListener('input', () => { currentData.fiche[el.dataset.fid] = el.value; scheduleSaveProjectData(); });
    if(el.tagName === 'SELECT'){
      el.addEventListener('change', () => { currentData.fiche[el.dataset.fid] = el.value; scheduleSaveProjectData(); });
    }
  });
}

/* ============================= NOTES GÉNÉRALES TAB ============================= */

function renderNotesTab(){
  const container = $('#tabContent');
  const notes = currentData.generalNotes || '';
  const items = currentData.customChecklist || [];
  const ordered = items.filter(it => !it.checked).concat(items.filter(it => it.checked));

  container.innerHTML = `
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>📝 Notes générales</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <textarea id="projNotesTextarea" class="notes-textarea" placeholder="Notes générales sur ce projet…">${escapeHtml(notes)}</textarea>
      </div>
    </div>
    <div class="fiche-section">
      <div class="fiche-section-head"><h4>☑ Points complémentaires</h4></div>
      <div class="fiche-fields" style="grid-template-columns:1fr;">
        <p class="settings-hint">Ajoute ici tout point spécifique à ce projet qui ne fait pas partie de la checklist standard. Coche-le une fois fait : il descend en bas de liste, en transparence, sans être supprimé.</p>
        <div class="seance-add-row">
          <input type="text" id="customChecklistNewItem" placeholder="Ajouter un point…">
          <button class="btn btn-primary" id="customChecklistAddBtn">+ Ajouter</button>
        </div>
        <div class="seance-list">
          ${ordered.length ? ordered.map(it => `
            <div class="seance-item ${it.checked?'done':''}" data-id="${it.id}">
              <div class="seance-item-top">
                <input type="checkbox" class="seance-check" data-id="${it.id}" ${it.checked?'checked':''}>
                <span class="seance-text" data-id="${it.id}" contenteditable="true" spellcheck="false">${escapeHtml(it.text)}</span>
                <button class="seance-del" data-id="${it.id}" title="Supprimer">×</button>
              </div>
              ${noteBlockHtml(it.id, it.note, 'seance-note', `data-id="${it.id}"`)}
            </div>
          `).join('') : '<div class="settings-empty">Aucun point pour l\u2019instant.</div>'}
        </div>
      </div>
    </div>
  `;

  $('#projNotesTextarea').addEventListener('input', e => {
    currentData.generalNotes = e.target.value;
    scheduleSaveProjectData();
  });

  function addItem(){
    const input = $('#customChecklistNewItem');
    const text = input.value.trim();
    if(!text) return;
    if(!currentData.customChecklist) currentData.customChecklist = [];
    currentData.customChecklist.unshift({ id: uid(), text, checked:false, note:'' });
    input.value = '';
    scheduleSaveProjectData();
    renderNotesTab();
  }
  $('#customChecklistAddBtn').addEventListener('click', addItem);
  $('#customChecklistNewItem').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });

  container.querySelectorAll('.seance-check').forEach(cb => cb.addEventListener('change', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === cb.dataset.id);
    if(it) it.checked = cb.checked;
    scheduleSaveProjectData();
    renderNotesTab();
  }));
  container.querySelectorAll('.seance-del').forEach(btn => btn.addEventListener('click', async () => {
    const ok = await customConfirm('Supprimer ce point ?', { okText:'Supprimer' });
    if(!ok) return;
    currentData.customChecklist = (currentData.customChecklist || []).filter(x => x.id !== btn.dataset.id);
    scheduleSaveProjectData();
    renderNotesTab();
  }));
  container.querySelectorAll('.seance-text').forEach(span => span.addEventListener('blur', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === span.dataset.id);
    const newText = span.textContent.trim();
    if(it && newText && it.text !== newText){ it.text = newText; scheduleSaveProjectData(); }
  }));
  container.querySelectorAll('.seance-note').forEach(ta => ta.addEventListener('input', () => {
    const it = (currentData.customChecklist || []).find(x => x.id === ta.dataset.id);
    if(it){ it.note = ta.value; scheduleSaveProjectData(); }
  }));
  wireNoteToggles(container, renderNotesTab);
}

function buildReportHtmlFragment(){
  const p = projects.find(x => x.id === currentProjectId);
  const flux = p ? p.numFlux : null;
  const checked = countChecked(currentData, flux);
  const total = projectTotalItems(currentData, flux);
  const pct = total ? Math.round((checked/total)*100) : 0;

  const checklistHtml = total ? projectTemplate(currentData, flux).map(partie => {
    const secs = partie.sections.map(sec => {
      const items = sec.items.map((label, idx) => {
        const k = itemKey(sec.id, idx);
        const st = currentData.checklist[k] || { checked:false, note:'', photos:[] };
        const photosHtml = (st.photos && st.photos.length) ? `<div class="rp-photos">${st.photos.map(ph=>`<img src="${ph}" class="rp-photo">`).join('')}</div>` : '';
        return `<div class="rp-item ${st.checked?'done':'pending'}">
          <div class="mark">${st.checked?'✓':'○'}</div>
          <div><div>${escapeHtml(label)}</div>${st.note?`<div class="note">${escapeHtml(st.note)}</div>`:''}</div>
          ${photosHtml}
        </div>`;
      }).join('');
      return `<h4 class="rp-h4">${escapeHtml(sec.title)}</h4>${items}`;
    }).join('');
    return `<h3 class="rp-h3">${escapeHtml(partie.title)}</h3>${secs}`;
  }).join('') : `<p style="color:var(--steel);font-style:italic;">Aucune checklist de planification disponible pour le flux « ${escapeHtml(flux || '—')} ».</p>`;

  const ficheHtml = FICHE_TEMPLATE.map(sec => {
    const rows = sec.fields.map(f => {
      const val = currentData.fiche[f.id];
      return `<div class="rp-fiche-row"><b>${escapeHtml(f.label)} : </b><span class="val ${val?'':'empty'}">${val?escapeHtml(val):'non renseigné'}</span></div>`;
    }).join('');
    return `<h3 class="rp-h3">${escapeHtml(sec.title)}</h3>${rows}`;
  }).join('');

  const galleryPhotos = currentData.fichePhotos || [];
  const galleryHtml = galleryPhotos.length ? `
    <h3 class="rp-h3" style="background:var(--amber-dark)">PHOTOS DU SITE</h3>
    <div class="rp-gallery">
      ${galleryPhotos.map(ph => `<div class="rp-gallery-item"><img src="${ph.dataUrl}"><div class="rp-gallery-caption">${escapeHtml(ph.caption||'')}</div></div>`).join('')}
    </div>` : '';

  const genNotes = (currentData.generalNotes || '').trim();
  const ccItems = currentData.customChecklist || [];
  const notesHtml = (genNotes || ccItems.length) ? `
    <h3 class="rp-h3" style="background:var(--amber-dark)">NOTES GÉNÉRALES</h3>
    ${genNotes ? `<p style="white-space:pre-wrap;font-size:13px;color:var(--graphite);">${escapeHtml(genNotes)}</p>` : ''}
    ${ccItems.length ? `<h4 class="rp-h4">Points complémentaires</h4>${ccItems.map(it => `
      <div class="rp-item ${it.checked?'done':'pending'}">
        <div class="mark">${it.checked?'✓':'○'}</div>
        <div><div>${escapeHtml(it.text)}</div>${it.note?`<div class="note">${escapeHtml(it.note)}</div>`:''}</div>
      </div>`).join('')}` : ''}` : '';

  return `
    <h2 class="rp-title">${escapeHtml(p.name || 'Projet')}</h2>
    <div class="rp-sub">Rapport complet de projet — généré le ${new Date().toLocaleDateString('fr-FR')}</div>
    <div class="rp-meta-grid">
      <div><b>Client :</b> ${escapeHtml(p.client || '—')}</div>
      <div><b>N° de commande :</b> ${escapeHtml(p.numCommande || '—')}</div>
      <div><b>Flux :</b> ${escapeHtml(p.numFlux || '—')}</div>
      <div><b>Coordinateur :</b> ${escapeHtml(p.coordinateur || '—')}</div>
      <div><b>Date :</b> ${p.date ? new Date(p.date).toLocaleDateString('fr-FR') : '—'}</div>
      <div><b>Échéance :</b> ${p.echeance ? new Date(p.echeance).toLocaleDateString('fr-FR') : '—'}</div>
      <div><b>Avancement checklist :</b> ${total ? `${checked}/${total} (${pct}%)` : 'Non applicable pour ce flux'}</div>
    </div>
    <h3 class="rp-h3" style="background:var(--amber-dark)">CHECKLIST DE PLANIFICATION</h3>
    ${checklistHtml}
    <h3 class="rp-h3" style="background:var(--amber-dark)">FICHE DE VISITE DE CHANTIER</h3>
    ${ficheHtml}
    ${galleryHtml}
    ${notesHtml}
  `;
}

function renderRapportTab(){
  const container = $('#tabContent');
  const flux = getCurrentProjectFlux();
  const checked = countChecked(currentData, flux);
  const total = projectTotalItems(currentData, flux);
  const remaining = total - checked;
  let filledFiche = 0, totalFiche = 0;
  FICHE_TEMPLATE.forEach(s => s.fields.forEach(f => { totalFiche++; if(currentData.fiche[f.id]) filledFiche++; }));

  container.innerHTML = `
    <div id="reportActions">
      <button class="btn btn-primary" id="downloadReportBtn">⬇ Télécharger le rapport (HTML)</button>
      <button class="btn btn-ghost" id="printReportBtn">🖶 Imprimer / Enregistrer en PDF</button>
    </div>
    <div class="stat-strip">
      <div class="stat-box"><div class="n">${checked}/${total}</div><div class="l">Points cochés</div></div>
      <div class="stat-box"><div class="n">${remaining}</div><div class="l">Points restants</div></div>
      <div class="stat-box"><div class="n">${filledFiche}/${totalFiche}</div><div class="l">Champs fiche renseignés</div></div>
    </div>
    <div id="reportPreview">${buildReportHtmlFragment()}</div>
  `;
  $('#downloadReportBtn').addEventListener('click', downloadReport);
  $('#printReportBtn').addEventListener('click', () => window.print());
}

function downloadReport(){
  const p = projects.find(x => x.id === currentProjectId);
  const fragment = buildReportHtmlFragment();
  const styles = document.querySelector('style').innerHTML;
  const full = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Rapport — ${escapeHtml(p.name)}</title>
  <style>${styles}
  body{padding:40px;background:#fff;}
  #reportPreview{border:none;padding:0;max-width:820px;margin:0 auto;}
  </style></head><body><div id="reportPreview">${fragment}</div></body></html>`;
  const blob = new Blob([full], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (p.name || 'projet').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  a.href = url;
  a.download = `rapport_${safeName}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Rapport téléchargé');
}

/* ============================= EXPORT / IMPORT ALL DATA ============================= */

async function exportAllData(){
  await flushAllPending();
  const payload = { version:1, exportedAt:new Date().toISOString(), projects, projectData:{} };
  for(const p of projects){
    payload.projectData[p.id] = (p.id === currentProjectId && currentData) ? currentData : await loadProjectData(p.id);
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gestion_de_projet_sauvegarde_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Sauvegarde exportée');
}

async function importAllData(file){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if(!payload || !Array.isArray(payload.projects)) throw new Error('format invalide');
    const ok = await customConfirm(`Importer ${payload.projects.length} projet(s) ? Les projets ayant le même identifiant seront remplacés.`, { okText:'Importer', danger:false });
    if(!ok) return;
    for(const p of payload.projects){
      const idx = projects.findIndex(x => x.id === p.id);
      if(idx >= 0) projects[idx] = p; else projects.push(p);
      const d = (payload.projectData && payload.projectData[p.id]) ? payload.projectData[p.id] : { checklist:{}, fiche:{}, fichePhotos:[], collapsed:{}, activeOptions:{}, generalNotes:'', customChecklist:[] };
      lsSet('project:' + p.id, JSON.stringify(d));
    }
    projectStatsCache = {};
    saveProjects();
    currentProjectId = null;
    currentData = null;
    await renderDashboardView();
    showToast('Import terminé');
  }catch(e){
    showToast("Échec de l'import : fichier invalide");
  }
}

  appSettings = loadSettings();

    lsSet('hasSeenManual', '1');

}

  if(opeSaveTimer){ clearTimeout(opeSaveTimer); saveSeanceOpeBoard(); }

});
