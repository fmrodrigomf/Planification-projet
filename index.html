<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestion de Projet">
<meta name="theme-color" content="#232a31">
<title>Gestion de Projet</title>
<script>
(function(){
  try{
    const c=document.createElement('canvas');c.width=512;c.height=512;
    const ctx=c.getContext('2d');
    const r=100;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);ctx.lineTo(r,512);ctx.quadraticCurveTo(0,512,0,512-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const bg=ctx.createLinearGradient(0,0,512,512);bg.addColorStop(0,'#2e3740');bg.addColorStop(1,'#1c2126');ctx.fillStyle=bg;ctx.fill();
    const glow=ctx.createRadialGradient(256,256,40,256,256,230);glow.addColorStop(0,'rgba(217,123,31,0.30)');glow.addColorStop(1,'rgba(217,123,31,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(256,256,230,0,Math.PI*2);ctx.fill();
    ctx.font='250px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🦺',256,270);
    ctx.beginPath();ctx.arc(256,256,248,0,Math.PI*2);ctx.strokeStyle='rgba(217,123,31,0.35)';ctx.lineWidth=6;ctx.stroke();
    const lnk=document.createElement('link');lnk.rel='apple-touch-icon';lnk.href=c.toDataURL('image/png');document.head.appendChild(lnk);
    const fav=document.createElement('link');fav.rel='icon';fav.type='image/png';fav.href=c.toDataURL('image/png');document.head.appendChild(fav);
  }catch(e){}
})();
</script>
<style>
  :root{
    --graphite:#232a31;
    --graphite-2:#2e3740;
    --steel:#5b6b78;
    --steel-light:#8a97a3;
    --paper:#f4f2ee;
    --paper-2:#ffffff;
    --line:#dcd8d0;
    --amber:#d97b1f;
    --amber-dark:#b6640f;
    --amber-tint:#fbe9d5;
    --ok:#3f7d52;
    --ok-tint:#e3efe6;
    --danger:#c2401f;
    --font-display:'Zilla Slab','Georgia',serif;
    --font-body:'Inter','Segoe UI',system-ui,sans-serif;
    --font-mono:'IBM Plex Mono','Courier New',monospace;
  }
  body.theme-dark{
    --paper:#1b1f24;
    --paper-2:#242a31;
    --graphite:#f1efe9;
    --graphite-2:#3a4550;
    --line:#3a4149;
    --steel:#aab3ba;
    --steel-light:#7f8993;
    --amber-tint:#3a2c15;
    --ok-tint:#1c2e22;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--graphite);
    -webkit-font-smoothing:antialiased;
    transition:background .15s ease,color .15s ease;
  }
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c9c3b8;border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  #app{display:flex;height:100vh;overflow:hidden;}

  #mobileMenuBtn{
    display:none;position:fixed;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:45;
    width:40px;height:40px;border-radius:8px;background:var(--graphite-2);color:#fff;border:none;
    font-size:17px;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3);cursor:pointer;
  }
  #sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(10,12,14,.5);z-index:39;}
  body.sidebar-open #sidebarOverlay{display:block;}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:280px;
    min-width:280px;
    background:var(--graphite-dark,#232a31);
    color:#e9e6df;
    display:flex;
    flex-direction:column;
    border-right:1px solid #171c20;
  }
  .brand{
    padding:22px 20px 16px;
    border-bottom:1px solid #384049;
  }
  .brand .mark{display:flex;align-items:baseline;gap:8px;}
  .brand .mark .num{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--amber);}
  .brand h1{font-family:var(--font-display);font-size:21px;font-weight:600;margin:6px 0 2px;color:#fff;letter-spacing:.01em;}
  .brand p{margin:0;font-size:12px;color:#9aa4ad;}
  #newProjectBtn{
    margin:16px 20px 8px;background:var(--amber);color:#1c1305;border:none;padding:11px 14px;
    border-radius:3px;font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:8px;letter-spacing:.01em;transition:background .15s ease;
  }
  #newProjectBtn:hover{background:#e78a2d;}
  #newProjectBtn:active{background:var(--amber-dark);}

  .nav-btn{
    margin:6px 20px 4px;background:none;border:1px solid #384049;color:#e9e6df;padding:9px 12px;
    border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;
    display:flex;align-items:center;gap:8px;transition:all .12s ease;
  }
  .nav-btn:hover{background:#2c353d;}
  .nav-btn.active{background:var(--amber);color:#1c1305;border-color:var(--amber);}

  .sidebar-label{padding:14px 20px 4px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#7f8993;font-weight:700;}

  #projectList{flex:1;overflow-y:auto;padding:4px 10px 10px;min-height:60px;}
  .project-item{
    padding:12px 12px;border-radius:4px;cursor:pointer;margin-bottom:4px;
    border:1px solid transparent;transition:background .12s ease, border-color .12s ease;
  }
  .project-item:hover{background:#2c353d;}
  .project-item.active{background:#333e47;border-color:#48545f;}
  .project-item .pname{font-weight:600;font-size:14px;color:#f2efe9;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .project-item .pclient{font-size:11.5px;color:#9aa4ad;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pbar{height:5px;background:#1d2327;border-radius:3px;overflow:hidden;}
  body.theme-dark .pbar{background:#10141a;}
  .pbar-fill{height:100%;background:linear-gradient(90deg,var(--amber),#f0a94f);border-radius:3px;transition:width .25s ease;}
  .pbar-fill.cc{background:linear-gradient(90deg,#4f8ecb,#7fb2e0);}
  .pbar-cat{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel-light);margin-top:8px;margin-bottom:2px;}
  .pbar-cat:first-of-type{margin-top:10px;}
  .pbar-label{font-family:var(--font-mono);font-size:10px;color:#7f8993;margin-top:5px;}
  .empty-side{padding:16px 14px;font-size:12px;color:#7f8993;line-height:1.6;}

  .sidebar-footer{padding:12px 20px 18px;border-top:1px solid #384049;}
  .save-status{height:16px;font-size:11px;font-family:var(--font-mono);margin-bottom:8px;transition:opacity .2s ease;}
  .save-status.saving{color:var(--amber);}
  .save-status.saved{color:#7fbf8f;}
  .save-status.error{color:#e08070;}
  .footer-btn{
    width:100%;background:#2c353d;border:1px solid #3a444d;color:#e9e6df;padding:8px 10px;
    border-radius:4px;font-size:12.5px;font-weight:600;cursor:pointer;margin-bottom:8px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .footer-btn:hover{background:#333e47;}
  .footer-row{display:flex;gap:8px;}
  .footer-btn.small{flex:1;margin-bottom:0;font-size:11.5px;padding:7px 6px;}

  /* ---------- MAIN ---------- */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  #dashboardView{flex:1;overflow-y:auto;padding:28px 32px 60px;}
  .dv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:82%;color:var(--steel);text-align:center;padding:40px;}
  .dv-empty .glyph{font-family:var(--font-display);font-size:56px;color:var(--line);margin-bottom:6px;}
  .dv-empty h2{font-family:var(--font-display);font-size:22px;color:var(--graphite);margin:6px 0;}
  .dv-empty p{font-size:13.5px;max-width:360px;line-height:1.6;}
  .dashboard-header{margin-bottom:20px;}
  .seance-summary-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .seance-summary-card{
    flex:1;min-width:220px;background:var(--paper-2);border:1px solid var(--line);border-radius:8px;
    padding:14px 16px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:border-color .12s,transform .12s;
  }
  .seance-summary-card:hover{border-color:var(--amber);transform:translateY(-2px);}
  .ssc-icon{font-size:26px;flex-shrink:0;}
  .ssc-body{flex:1;min-width:0;}
  .ssc-title{font-family:var(--font-display);font-size:14.5px;color:var(--graphite);margin-bottom:6px;font-weight:600;}
  .dashboard-header h2{font-family:var(--font-display);font-size:26px;margin:0 0 4px;color:var(--graphite);}
  .dashboard-header p{color:var(--steel);font-size:13.5px;margin:0;}
  .alert-section{margin-bottom:24px;}
  .alert-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);margin:0 0 10px;}
  .alert-row{
    display:flex;justify-content:space-between;align-items:center;background:var(--paper-2);
    border:1px solid var(--line);border-left:3px solid var(--danger);border-radius:4px;
    padding:10px 14px;margin-bottom:8px;cursor:pointer;font-size:13px;
  }
  .alert-row:hover{border-color:var(--steel);}
  .alert-row.stalled{border-left-color:var(--amber-dark);}
  .alert-row b{color:var(--graphite);}
  .alert-row .a-info{color:var(--steel);font-size:12px;font-family:var(--font-mono);}
  .dash-filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .dash-filter-bar input[type=text]{flex:1;min-width:200px;border:1px solid var(--line);border-radius:4px;padding:9px 12px;font-size:13px;background:var(--paper-2);color:var(--graphite);}
  .dash-filter-bar select{border:1px solid var(--line);border-radius:4px;padding:9px 10px;font-size:12.5px;background:var(--paper-2);color:var(--graphite);}
  .dash-filter-bar input:focus, .dash-filter-bar select:focus{outline:2px solid var(--amber);outline-offset:-1px;}
  .pc-modified{font-size:10.5px;color:var(--steel-light);font-family:var(--font-mono);margin-top:6px;}
  .ech-list{display:flex;flex-direction:column;gap:8px;}
  .ech-row{display:flex;align-items:center;gap:16px;background:var(--paper-2);border:1px solid var(--line);border-left:3px solid var(--steel-light);border-radius:6px;padding:12px 16px;cursor:pointer;transition:border-color .12s;}
  .ech-row:hover{border-color:var(--amber);}
  .ech-row.overdue{border-left-color:var(--danger);}
  .ech-date{width:110px;flex-shrink:0;text-align:center;}
  .ech-date-day{font-family:var(--font-mono);font-size:13px;color:var(--graphite);font-weight:700;}
  .ech-date-rel{font-size:10.5px;color:var(--steel);margin-top:2px;}
  .ech-row.overdue .ech-date-rel{color:var(--danger);font-weight:600;}
  .ech-body{flex:1;min-width:0;}
  .ech-client{font-family:var(--font-display);font-size:14.5px;color:var(--graphite);font-weight:600;}
  .ech-name{font-size:12px;color:var(--steel);margin-top:2px;}
  .ech-progress{font-family:var(--font-mono);font-size:12px;color:var(--steel);flex-shrink:0;}
  .ech-gantt{margin-top:8px;max-width:320px;}
  .ech-gantt-track{position:relative;height:8px;background:var(--paper);border:1px solid var(--line);border-radius:4px;overflow:visible;}
  .ech-gantt-fill{position:absolute;top:0;left:0;bottom:0;border-radius:4px 0 0 4px;transition:width .3s ease;}
  .ech-gantt-fill.ontrack{background:var(--ok);}
  .ech-gantt-fill.late{background:var(--danger);}
  .ech-gantt-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--graphite);}
  body.theme-dark .ech-gantt-marker{background:#fff;}
  .ech-gantt-label{font-size:10.5px;color:var(--steel);margin-top:4px;}
  .ech-gantt-label.ok{color:var(--ok);}
  .ech-gantt-label.late{color:var(--danger);}
  .project-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
  .project-card{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:16px 18px;cursor:pointer;transition:border-color .12s,transform .12s;}
  .project-card:hover{border-color:var(--amber);transform:translateY(-2px);}
  .project-card .pc-name{font-family:var(--font-display);font-size:16px;color:var(--graphite);margin-bottom:2px;}
  .project-card .pc-client{font-size:12px;color:var(--steel);margin-bottom:10px;}
  .badge-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
  .badge.overdue{background:#fbeceb;color:var(--danger);}
  .badge.stalled{background:var(--amber-tint);color:var(--amber-dark);}
  .badge.pending-zero{background:#e4edf5;color:#3a6690;}
  body.theme-dark .badge.pending-zero{background:#1c2c3a;color:#7fb2e0;}
  .badge.pending-low{background:var(--amber-tint);color:var(--amber-dark);}
  .badge.pending-high{background:#fbeceb;color:var(--danger);}
  .badge.done{background:var(--ok-tint);color:var(--ok);}

  #projectView{flex-direction:column;height:100%;}
  #projectHeader{padding:20px 32px 0;background:var(--paper-2);border-bottom:1px solid var(--line);}
  .ph-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;}
  .ph-title-row{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .proj-title-display{
    font-family:var(--font-display);font-weight:600;color:var(--graphite);margin:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.25;
  }
  .ph-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .icon-btn{
    background:none;border:1px solid var(--line);color:var(--steel);width:34px;height:34px;border-radius:4px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s ease;
  }
  .icon-btn:hover{border-color:var(--steel);color:var(--graphite);background:var(--paper);}
  .icon-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:#fbeceb;}
  .icon-btn.active-finished{border-color:var(--ok);color:var(--ok);background:var(--ok-tint);}
  .project-item.finished, .project-card.finished{opacity:.6;}

  .ph-summary{display:flex;flex-wrap:wrap;gap:5px 4px;font-size:12.5px;color:var(--steel);margin:8px 0 16px;align-items:center;}
  .phs-item{display:inline-flex;gap:4px;}
  .phs-item b{color:var(--graphite);font-weight:600;}
  .phs-sep{color:var(--line);}

  /* shared form fields used inside the create/edit project modal */
  .echeance-toggle{display:flex;gap:4px;margin-bottom:6px;}
  .etg-btn{flex:1;border:1px solid var(--line);background:var(--paper-2);color:var(--steel);padding:5px 8px;border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;}
  .etg-btn.active{background:var(--amber);border-color:var(--amber);color:#1c1305;}
  #pfEcheanceWeeksWrap{display:flex;align-items:center;gap:8px;}
  #pfEcheanceWeeksWrap input{width:70px;border:1px solid var(--line);border-radius:3px;padding:6px 8px;font-size:13px;background:var(--paper);color:var(--graphite);}
  .echeance-hint{font-size:11.5px;color:var(--steel);font-family:var(--font-mono);}
  .modal select{width:100%;border:1px solid var(--line);border-radius:4px;padding:9px 10px;font-size:14px;font-family:var(--font-body);background:var(--paper);color:var(--graphite);}
  .modal select:focus{outline:2px solid var(--amber);outline-offset:-1px;background:var(--paper-2);}
  .modal-scroll{max-height:70vh;overflow-y:auto;padding-right:4px;}
  .manual-modal{width:560px;}
  .manual-scroll{max-height:65vh;}
  .manual-section{padding:12px 0;border-bottom:1px solid var(--line);}
  .manual-section:last-child{border-bottom:none;}
  .manual-section-title{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--graphite);margin-bottom:5px;}
  .manual-section-body{font-size:12.5px;color:var(--steel);line-height:1.6;}
  .routine-list{display:flex;flex-direction:column;gap:8px;}
  .routine-item{
    display:flex;align-items:center;gap:12px;padding:12px 14px;
    border:1px solid var(--line);border-radius:6px;background:var(--paper);
    cursor:pointer;transition:opacity .2s ease,border-color .15s ease;
  }
  .routine-item:hover{border-color:var(--amber);}
  .routine-item.done{opacity:.5;}
  .routine-item .routine-check{width:18px;height:18px;flex-shrink:0;accent-color:var(--amber-dark);cursor:pointer;margin:0;}
  .routine-item .routine-text{flex:1;font-size:13.5px;color:var(--graphite);line-height:1.4;}
  .routine-item.done .routine-text{text-decoration:line-through;color:var(--steel);}

  #settingsView{flex:1;overflow-y:auto;padding:28px 32px 60px;}
  #seanceView{flex:1;overflow-y:auto;padding:28px 32px 60px;}
  #echeancesView{flex:1;overflow-y:auto;padding:28px 32px 60px;}
  .settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
  .settings-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .settings-item{display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:7px 10px;font-size:13px;color:var(--graphite);}
  .settings-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:15px;line-height:1;}
  .settings-del:hover{color:var(--danger);}
  .settings-empty{font-size:12.5px;color:var(--steel-light);padding:6px 2px;}
  .settings-add-row{display:flex;gap:8px;}
  .settings-add-input{flex:1;border:1px solid var(--line);border-radius:4px;padding:8px 10px;font-size:13px;background:var(--paper);color:var(--graphite);}
  .settings-hint{font-size:12.5px;color:var(--steel);line-height:1.5;margin:0 0 12px;}
  .cc-progress{font-family:var(--font-mono);font-size:11.5px;color:var(--steel);}
  .popt-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .popt-item{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:10px 12px;}
  .popt-item-head{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--graphite);}
  .popt-count{font-family:var(--font-mono);font-size:11px;color:var(--steel);flex:1;}
  .popt-edit,.popt-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:14px;}
  .popt-edit:hover{color:var(--amber-dark);}
  .popt-del:hover{color:var(--danger);}
  .popt-items-preview{font-size:11.5px;color:var(--steel-light);margin-top:5px;line-height:1.5;}

  .btn-sm{padding:6px 11px;font-size:11.5px;}
  .flux-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .flux-tab-btn{border:1px solid var(--line);background:var(--paper-2);color:var(--steel);padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .flux-tab-btn.active{background:var(--amber);border-color:var(--amber);color:#1c1305;}
  .flux-tab-wrap{position:relative;display:inline-flex;}
  .flux-tab-del{
    position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;
    width:16px;height:16px;border-radius:50%;font-size:10px;line-height:1;cursor:pointer;padding:0;
  }
  .flux-tab-add{border-style:dashed;color:var(--steel);}
  .flux-tab-add:hover{color:var(--amber-dark);border-color:var(--amber);}
  .flux-partie-card{background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:14px;margin-bottom:14px;}
  .flux-partie-head{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .flux-partie-head .flux-partie-title{font-family:var(--font-display);font-size:15px;font-weight:600;border:1px solid var(--line);border-radius:4px;padding:7px 10px;background:var(--paper-2);color:var(--graphite);flex:1;}
  .flux-partie-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:14px;flex-shrink:0;}
  .flux-partie-del:hover{color:var(--danger);}
  .flux-section-card{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:11px 12px;margin:0 0 10px 14px;}
  .flux-section-head{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .flux-section-head .flux-section-title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--line);border-radius:4px;padding:6px 9px;background:var(--paper);color:var(--steel);flex:1;}
  .flux-section-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:14px;flex-shrink:0;}
  .flux-section-del:hover{color:var(--danger);}
  .flux-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
  .flux-item-row{display:flex;gap:8px;align-items:center;}
  .flux-item-row .flux-item-text{flex:1;border:1px solid var(--line);border-radius:4px;padding:6px 9px;font-size:12.5px;background:var(--paper);color:var(--graphite);}
  .flux-item-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:13px;flex-shrink:0;}
  .flux-item-del:hover{color:var(--danger);}
  .flux-add-row{display:flex;gap:8px;}
  .flux-add-row input{flex:1;border:1px dashed var(--steel-light);border-radius:4px;padding:7px 10px;font-size:12.5px;background:var(--paper-2);color:var(--graphite);}
  .notes-textarea{width:100%;min-height:220px;border:1px solid var(--line);border-radius:5px;padding:12px 14px;font-size:13.5px;font-family:var(--font-body);color:var(--graphite);background:var(--paper);resize:vertical;line-height:1.6;}
  .notes-textarea:focus{outline:2px solid var(--amber);outline-offset:-1px;background:var(--paper-2);}
  .seance-add-row{display:flex;gap:8px;margin-bottom:18px;}
  .seance-add-row input{flex:1;border:1px solid var(--line);border-radius:4px;padding:9px 12px;font-size:13.5px;background:var(--paper-2);color:var(--graphite);}
  .seance-add-row input:focus{outline:2px solid var(--amber);outline-offset:-1px;}
  .seance-list{display:flex;flex-direction:column;gap:8px;}
  .seance-item{display:flex;flex-direction:column;gap:6px;background:var(--paper-2);border:1px solid var(--line);border-radius:5px;padding:11px 14px;transition:opacity .3s ease;}
  .seance-item-top{display:flex;align-items:center;gap:10px;}
  .seance-item.done{opacity:.42;}
  .seance-item .seance-check{width:17px;height:17px;accent-color:var(--amber-dark);cursor:pointer;flex-shrink:0;}
  .seance-item .seance-text{flex:1;font-size:13.5px;color:var(--graphite);outline:none;line-height:1.4;}
  .seance-item.done .seance-text{text-decoration:line-through;}
  .seance-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:16px;flex-shrink:0;}
  .seance-del:hover{color:var(--danger);}

  /* ---------- SÉANCE OPE (staging + 2 columns, drag & drop) ---------- */
  .ope-staging{
    background:var(--amber-tint);border:1px dashed var(--amber);border-radius:8px;
    padding:14px;margin-bottom:20px;min-height:64px;display:flex;flex-wrap:wrap;gap:10px;transition:background .15s ease;
  }
  .ope-staging.drag-over{background:var(--amber);}
  .ope-staging-empty{font-size:12.5px;color:var(--amber-dark);padding:8px;}
  .ope-board{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .ope-column{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:14px;min-height:180px;transition:background .15s ease,border-color .15s ease;}
  .ope-column.drag-over{background:var(--amber-tint);border-color:var(--amber);}
  .ope-column-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ope-column-head h4{margin:0;font-family:var(--font-display);font-size:15px;color:var(--graphite);}
  .ope-column-add{margin-bottom:10px;}
  .ope-column-add input{width:100%;border:1px solid var(--line);border-radius:4px;padding:7px 10px;font-size:12.5px;background:var(--paper);color:var(--graphite);}
  .ope-column-add input:focus{outline:2px solid var(--amber);outline-offset:-1px;}
  .ope-column-body{display:flex;flex-direction:column;gap:8px;min-height:50px;}
  .ope-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:9px 11px;cursor:grab;transition:opacity .15s ease;width:220px;}
  .ope-column .ope-card{width:auto;}
  .ope-card:active{cursor:grabbing;}
  .ope-card.dragging{opacity:.35;}
  .ope-card.done{opacity:.5;}
  .ope-card-top{display:flex;align-items:flex-start;gap:8px;}
  .ope-check{width:16px;height:16px;margin-top:2px;accent-color:var(--amber-dark);cursor:pointer;flex-shrink:0;}
  .ope-text{flex:1;font-size:13px;color:var(--graphite);outline:none;line-height:1.35;}
  .ope-card.done .ope-text{text-decoration:line-through;}
  .ope-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:14px;flex-shrink:0;}
  .ope-del:hover{color:var(--danger);}
  .ope-note, .seance-note, .cc-note{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:3px;padding:5px 8px;font-size:11.5px;font-family:var(--font-body);color:var(--graphite);background:var(--paper-2);resize:vertical;min-height:26px;}
  .ope-note:focus{outline:2px solid var(--amber);outline-offset:-1px;}
  .ope-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .notes-saved-hint{font-size:11px;color:var(--steel-light);margin-top:6px;font-family:var(--font-mono);}

  .tabs{display:flex;gap:2px;margin-top:4px;}
  .tab-btn{background:none;border:none;padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--steel);cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;gap:7px;font-family:var(--font-body);}
  .tab-btn .count{font-family:var(--font-mono);font-size:10.5px;background:var(--paper);color:var(--steel);padding:1px 6px;border-radius:9px;}
  .tab-btn.active{color:var(--graphite);border-bottom-color:var(--amber);}
  .tab-btn.active .count{background:var(--amber-tint);color:var(--amber-dark);}
  .tab-btn:hover{color:var(--graphite);}

  #tabContent{flex:1;overflow-y:auto;padding:26px 32px 60px;}

  .checklist-toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .options-panel{background:var(--amber-tint);border:1px solid var(--amber);border-radius:6px;padding:12px 16px;margin-bottom:18px;}
  .options-panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--amber-dark);margin-bottom:9px;}
  .options-panel-list{display:flex;flex-wrap:wrap;gap:10px 20px;}
  .option-toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--graphite);cursor:pointer;}
  .option-toggle input{width:16px;height:16px;accent-color:var(--amber-dark);cursor:pointer;}
  .opt-count{font-family:var(--font-mono);font-size:11px;color:var(--steel);}
  #checklistSearch{flex:1;min-width:200px;border:1px solid var(--line);border-radius:4px;padding:9px 12px;font-size:13.5px;background:var(--paper-2);color:var(--graphite);}
  #checklistSearch:focus{outline:2px solid var(--amber);outline-offset:-1px;}
  .filter-pills{display:flex;gap:6px;}
  .pill{border:1px solid var(--line);background:var(--paper-2);color:var(--steel);padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .pill.active{background:var(--amber);border-color:var(--amber);color:#1c1305;}
  .no-results{padding:30px;text-align:center;color:var(--steel);font-size:13.5px;}

  /* ---------- CHECKLIST ---------- */
  .partie{margin-bottom:22px;background:var(--paper-2);border:1px solid var(--line);border-radius:6px;overflow:hidden;}
  .partie-head{padding:13px 18px;background:var(--graphite-2);color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .partie-head h3{font-family:var(--font-display);font-size:15.5px;margin:0;font-weight:600;letter-spacing:.01em;}
  .partie-head .partie-progress{font-family:var(--font-mono);font-size:11px;color:var(--amber);display:flex;align-items:center;gap:8px;}
  .partie-progress .mini-bar{width:60px;height:5px;background:#1d2327;border-radius:3px;overflow:hidden;}
  .partie-progress .mini-bar-fill{height:100%;background:var(--amber);}
  .chevron{transition:transform .15s ease;font-size:11px;color:#aab3ba;}
  .partie.collapsed .chevron{transform:rotate(-90deg);}
  .partie-body{padding:6px 18px 14px;}
  .partie.collapsed .partie-body{display:none;}

  .section-block{margin-top:10px;}
  .section-head{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;cursor:pointer;border-bottom:1px solid var(--line);}
  .section-head h4{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel);font-weight:700;}
  .section-head .sec-count{font-family:var(--font-mono);font-size:11px;color:var(--steel-light);}
  .section-items{padding:4px 0 8px;}
  .section-block.collapsed .section-items{display:none;}
  .section-block.collapsed .section-head .chev-s{transform:rotate(-90deg);}
  .chev-s{font-size:10px;color:var(--steel-light);margin-right:6px;transition:transform .15s ease;}

  .item-row{display:flex;gap:11px;padding:8px 4px;border-bottom:1px dashed var(--line);}
  .item-row:last-child{border-bottom:none;}
  .item-check{width:18px;height:18px;margin-top:2px;accent-color:var(--amber-dark);cursor:pointer;flex-shrink:0;}
  .item-main{flex:1;min-width:0;}
  .item-label{font-size:13.5px;color:var(--graphite);line-height:1.4;cursor:pointer;}
  .item-row.done .item-label{color:var(--ok);text-decoration:line-through;text-decoration-color:#b7d2bd;}
  .item-label-row{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0;}
  .item-label-row .item-label{flex:1;cursor:pointer;}
  .item-badge{font-size:11px;opacity:.85;}
  .item-badge.origin-badge{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:2px 8px;font-size:10.5px;color:var(--steel);opacity:1;}
  .item-expand-chev{font-size:10px;color:var(--steel-light);flex-shrink:0;}
  .seance-expand, .ope-expand{background:none;border:none;color:var(--steel-light);font-size:11px;cursor:pointer;flex-shrink:0;padding:2px 3px;}
  .seance-expand:hover, .ope-expand:hover{color:var(--amber-dark);}
  .note-toggle-btn, .photo-toggle-btn{
    background:none;border:none;color:var(--steel-light);font-size:11.5px;cursor:pointer;
    padding:5px 0 0;margin-top:2px;margin-right:12px;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-body);
  }
  .note-toggle-btn:hover, .photo-toggle-btn:hover{color:var(--amber-dark);}
  .item-note{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:3px;padding:6px 9px;font-size:12.5px;font-family:var(--font-body);color:var(--graphite);background:var(--paper);resize:vertical;min-height:32px;}
  .item-note::placeholder{color:var(--steel-light);}
  .item-note:focus{outline:2px solid var(--amber);outline-offset:-1px;background:var(--paper-2);}

  .item-photos{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
  .photo-thumb{position:relative;width:48px;height:48px;border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block;}
  .photo-del{position:absolute;top:-1px;right:-1px;background:var(--danger);color:#fff;border:none;width:16px;height:16px;border-radius:50%;font-size:10px;line-height:1;cursor:pointer;padding:0;}
  .photo-add-btn{width:48px;height:48px;border:1px dashed var(--steel-light);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--steel);flex-shrink:0;}
  .photo-add-btn:hover{border-color:var(--amber);color:var(--amber-dark);}

  /* ---------- FICHE ---------- */
  .fiche-section{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;margin-bottom:18px;overflow:hidden;}
  .fiche-section-head{padding:12px 18px;background:var(--paper);border-bottom:1px solid var(--line);}
  .fiche-section-head h4{margin:0;font-family:var(--font-display);font-size:15px;color:var(--graphite);}
  .fiche-fields{padding:16px 18px 8px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 20px;}
  .fiche-field{margin-bottom:6px;}
  .fiche-field.wide{grid-column:1 / -1;}
  .fiche-field.fiche-field-boxed{
    border:1px solid var(--line);border-radius:7px;background:var(--paper);
    padding:12px 14px 14px;margin-bottom:4px;
  }
  .fiche-field.fiche-field-boxed label{margin-bottom:9px;}
  .fiche-field label{display:block;font-size:12px;color:var(--steel);margin-bottom:5px;font-weight:600;line-height:1.35;}
  .fiche-field input[type=text], .fiche-field select, .fiche-field textarea{width:100%;border:1px solid var(--line);border-radius:3px;padding:7px 9px;font-size:13px;font-family:var(--font-body);color:var(--graphite);background:var(--paper);}
  .fiche-field textarea{min-height:64px;resize:vertical;}
  .fiche-field input:focus, .fiche-field select:focus, .fiche-field textarea:focus{outline:2px solid var(--amber);outline-offset:-1px;background:var(--paper-2);}

  .choices-field{width:100%;}
  .choices-row{display:flex;flex-wrap:wrap;gap:8px;}
  .choice-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--paper);border-radius:20px;padding:7px 14px;font-size:12.5px;color:var(--graphite);cursor:pointer;user-select:none;}
  .choice-chip input{width:14px;height:14px;accent-color:var(--amber-dark);cursor:pointer;}
  .choice-chip:has(input:checked){background:var(--amber-tint);border-color:var(--amber);}
  .choice-autre-note{width:100%;margin-top:8px;border:1px solid var(--line);border-radius:3px;padding:7px 9px;font-size:12.5px;font-family:var(--font-body);color:var(--graphite);background:var(--paper);resize:vertical;min-height:44px;}

  .doors-field{width:100%;}
  .doors-count-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .doors-count-row label{font-size:12px;color:var(--steel);font-weight:600;margin:0;}
  .doors-count-input{width:70px;border:1px solid var(--line);border-radius:3px;padding:6px 8px;font-size:13px;background:var(--paper);color:var(--graphite);}
  .doors-list{display:flex;flex-direction:column;gap:10px;}
  .door-card{border:1px solid var(--line);border-radius:6px;padding:10px 12px;background:var(--paper-2);}
  .door-card-title{font-size:12px;font-weight:700;color:var(--amber-dark);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .door-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .door-field-group label{display:block;font-size:11px;color:var(--steel);font-weight:600;margin-bottom:4px;}
  .door-dim, .door-note{width:100%;border:1px solid var(--line);border-radius:3px;padding:6px 9px;font-size:12.5px;background:var(--paper);color:var(--graphite);}

  .pl-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:6px;}
  .pl-table{width:100%;border-collapse:collapse;font-size:12px;min-width:760px;}
  .pl-table thead th{background:var(--graphite-2);color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;}
  .pl-th-sub{font-size:9px;font-weight:400;color:#aab3ba;text-transform:uppercase;}
  .pl-table tbody tr{border-bottom:1px solid var(--line);}
  .pl-table tbody tr:nth-child(even){background:var(--paper);}
  .pl-table td{padding:5px 6px;}
  .pl-table input.pl-label{width:100%;min-width:220px;border:1px solid transparent;border-radius:3px;padding:6px 8px;font-size:12px;background:transparent;color:var(--graphite);}
  .pl-table input.pl-label:focus{border-color:var(--line);background:var(--paper-2);}
  .pl-table input.pl-num{width:60px;border:1px solid var(--line);border-radius:3px;padding:6px 4px;font-size:12px;text-align:center;background:var(--paper-2);color:var(--graphite);}
  .pl-table input.pl-real{background:var(--amber-tint);}
  .pl-computed{font-family:var(--font-mono);font-size:11px;color:var(--steel);white-space:nowrap;text-align:center;}
  .pl-del{background:none;border:none;color:var(--steel);cursor:pointer;font-size:14px;}
  .pl-del:hover{color:var(--danger);}
  .pl-drag-handle{cursor:grab;color:var(--steel-light);text-align:center;width:24px;user-select:none;}
  .pl-drag-handle:active{cursor:grabbing;}
  .pl-row.dragging{opacity:.4;}
  .pl-row.drag-over{box-shadow:inset 0 2px 0 var(--amber), inset 0 -2px 0 var(--amber);}

  .fg-grid{display:flex;flex-wrap:wrap;gap:14px;}
  .fg-item{width:120px;position:relative;}
  .fg-item img{width:120px;height:90px;object-fit:cover;border-radius:5px;border:1px solid var(--line);cursor:pointer;display:block;}
  .fg-del{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;padding:0;}
  .fg-caption{width:120px;margin-top:4px;font-size:11px;padding:4px 6px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--graphite);}
  .fg-add{width:120px;height:90px;border:1px dashed var(--steel-light);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12.5px;color:var(--steel);flex-direction:column;gap:4px;text-align:center;}
  .fg-add:hover{border-color:var(--amber);color:var(--amber-dark);}

  /* ---------- RAPPORT ---------- */
  .report-sections-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .report-sections-label{font-size:12.5px;color:var(--steel);font-weight:600;}
  #reportActions{display:flex;gap:10px;margin-bottom:20px;}
  .btn{border:none;padding:10px 16px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--amber);color:#1c1305;}
  .btn-primary:hover{background:#e78a2d;}
  .btn-ghost{background:var(--paper-2);color:var(--graphite);border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--paper);}
  .btn-danger-solid{background:var(--danger);color:#fff;}
  .btn-danger-solid:hover{background:#a2381c;}

  #reportPreview{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:36px 40px;max-width:820px;font-family:var(--font-body);}
  #reportPreview h2.rp-title{font-family:var(--font-display);font-size:26px;margin:0 0 4px;color:var(--graphite);}
  #reportPreview .rp-sub{color:var(--steel);font-size:13px;margin-bottom:22px;}
  #reportPreview .rp-meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 24px;font-size:13px;margin-bottom:26px;padding-bottom:20px;border-bottom:2px solid var(--graphite);}
  #reportPreview .rp-meta-grid div b{color:var(--steel);font-weight:600;}
  #reportPreview h3.rp-h3{font-family:var(--font-display);font-size:17px;color:#fff;background:var(--graphite-2);padding:8px 14px;margin:26px 0 10px;border-radius:4px;}
  #reportPreview h4.rp-h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--amber-dark);margin:16px 0 6px;border-bottom:1px solid var(--line);padding-bottom:4px;}
  #reportPreview .rp-item{display:flex;gap:8px;font-size:13px;padding:4px 0;align-items:flex-start;flex-wrap:wrap;}
  #reportPreview .rp-item .mark{width:16px;flex-shrink:0;font-weight:700;}
  #reportPreview .rp-item.done .mark{color:var(--ok);}
  #reportPreview .rp-item.pending .mark{color:var(--danger);}
  #reportPreview .rp-item .note{color:var(--steel);font-style:italic;margin-top:1px;}
  #reportPreview .rp-photos{display:flex;gap:6px;margin:4px 0 4px 24px;flex-wrap:wrap;width:100%;}
  #reportPreview .rp-photo{width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--line);}
  #reportPreview .rp-fiche-row{font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line);}
  #reportPreview .rp-fiche-row b{color:var(--graphite);}
  #reportPreview .rp-fiche-row .val{color:var(--steel);}
  #reportPreview .rp-fiche-row .val.empty{color:var(--steel-light);}
  #reportPreview .rp-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;}
  #reportPreview .rp-gallery-item img{width:100%;height:110px;object-fit:cover;border-radius:4px;border:1px solid var(--line);}
  #reportPreview .rp-gallery-caption{font-size:11px;color:var(--steel);margin-top:4px;}

  .stat-strip{display:flex;gap:24px;margin-bottom:22px;flex-wrap:wrap;}
  .stat-box{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:14px 18px;min-width:120px;}
  .stat-box .n{font-family:var(--font-display);font-size:26px;color:var(--graphite);}
  .stat-box .l{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--steel-light);margin-top:2px;}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,24,27,.55);display:flex;align-items:center;justify-content:center;z-index:50;}

function defaultPlanningData(){
  return {
    startDate: new Date().toISOString().slice(0,10),
    echeanceOverride: null,
    tasks: DEFAULT_PLANNING_TASKS.map(label => ({ id: uid(), label, debut:null, duree:null, debutReel:null, dureeReel:null }))
  };
}

function addWeeksToDate(dateStr, weeks){
  if(!dateStr || weeks === null || weeks === undefined || weeks === '' || isNaN(weeks)) return null;
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + Math.round(parseFloat(weeks) * 7));
  return d;
}
function computePlannedEcheance(planning){
  if(!planning || !planning.startDate) return '';
  if(planning.echeanceOverride) return planning.echeanceOverride;
  let maxDate = null;
  (planning.tasks || []).forEach(t => {
    if(t.debut !== null && t.debut !== '' && t.duree !== null && t.duree !== '' && !isNaN(t.debut) && !isNaN(t.duree)){
      const end = addWeeksToDate(planning.startDate, parseFloat(t.debut) + parseFloat(t.duree));
      if(end && (!maxDate || end > maxDate)) maxDate = end;
    }
  });
  return maxDate ? maxDate.toISOString().slice(0,10) : '';
}
function computePlanningSpanWeeks(planning){
  let max = 0;
  (planning.tasks || []).forEach(t => {
    if(t.debut !== null && t.debut !== '' && t.duree !== null && t.duree !== '' && !isNaN(t.debut) && !isNaN(t.duree)){
      max = Math.max(max, parseFloat(t.debut) + parseFloat(t.duree));
    }
  });
  return max;
}

  });

function customConfirm(message, opts){
  opts = opts || {};
  const okText = opts.okText || 'Confirmer';
  const cancelText = opts.cancelText || 'Annuler';
  const danger = opts.danger !== false;
  return new Promise(resolve => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>${danger ? '⚠ Confirmation' : 'Confirmation'}</h3>
        <p class="confirm-msg">${escapeHtml(message)}</p>
        <div class="modal-actions">
          <button class="btn-text" id="cfCancel">${escapeHtml(cancelText)}</button>
          <button class="btn ${danger?'btn-danger-solid':'btn-primary'}" id="cfOk">${escapeHtml(okText)}</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);
    function close(v){ document.body.removeChild(backdrop); resolve(v); }
    backdrop.querySelector('#cfCancel').addEventListener('click', () => close(false));
    backdrop.querySelector('#cfOk').addEventListener('click', () => close(true));
    backdrop.addEventListener('click', e => { if(e.target === backdrop) close(false); });
  });
}

function customPrompt(title, placeholder){
  return new Promise(resolve => {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>${escapeHtml(title)}</h3>
        <input type="text" id="cpInput" placeholder="${escapeHtml(placeholder||'')}">
        <div class="modal-actions">
          <button class="btn-text" id="cpCancel">Annuler</button>
          <button class="btn btn-primary" id="cpOk">Ajouter</button>
        </div>
      </div>`;
    document.body.appendChild(backdrop);
    const input = backdrop.querySelector('#cpInput');
    input.focus();
    function close(v){ document.body.removeChild(backdrop); resolve(v); }
    backdrop.querySelector('#cpCancel').addEventListener('click', () => close(null));
    backdrop.querySelector('#cpOk').addEventListener('click', () => close(input.value.trim() || null));
    backdrop.addEventListener('click', e => { if(e.target === backdrop) close(null); });
    backdrop.addEventListener('keydown', e => {
      if(e.key === 'Enter') close(input.value.trim() || null);
      if(e.key === 'Escape') close(null);
    });
  });
}

/* ============================= IMAGE COMPRESSION ============================= */

function compressImage(file, maxWidth, quality){
  maxWidth = maxWidth || 800;
  quality = quality || 0.5;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function dataSizeOk(data){
  try{ return new Blob([JSON.stringify(data)]).size < 3 * 1024 * 1024; }
  catch(e){ return true; }
}

/* ============================= LOCAL STORAGE (device-local, like CarbuTrack) =============================
   Everything is saved to the browser's localStorage: instant, synchronous, no network involved.
   This means data lives only on this device/browser — it is NOT shared between different people
   or different browsers. Requires the file to be hosted/opened outside claude.ai (localStorage is
   disabled inside claude.ai's artifact preview). */

const LS_PREFIX = 'gestionProjet_';

function lsGet(key){
  try{ return localStorage.getItem(LS_PREFIX + key); }
  catch(e){ return null; }
}
function lsSet(key, value){
  try{ localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch(e){
    console.error('localStorage set failed for ' + key, e);
    showToast('⚠ Stockage local plein — libère de la place (ex. supprime d\u2019anciennes photos)');
    return false;
  }
}
function lsDelete(key){
  try{ localStorage.removeItem(LS_PREFIX + key); }catch(e){}
}

let checklistTemplates = {};

function loadChecklistTemplates(){
  const v = lsGet('checklistTemplates');
  const parsed = v ? JSON.parse(v) : {};
  const useOrDefault = (existing, def) => (existing && existing.length) ? existing : JSON.parse(JSON.stringify(def || []));
  const seeds = {
    'PRJ': DEFAULT_PRJ_CHECKLIST_TEMPLATE,
    'MI-0': DEFAULT_MI0_CHECKLIST_TEMPLATE,
    'MI-1': DEFAULT_MI1_CHECKLIST_TEMPLATE,
    'MI-2': DEFAULT_MI2_CHECKLIST_TEMPLATE
  };
  const result = {};
  getAllFluxOptions().forEach(flux => {
    result[flux] = useOrDefault(parsed[flux], seeds[flux]);
  });
  return result;
}

function getFluxTemplate(flux){
  return checklistTemplates[flux] || [];
}
function fluxHasChecklist(flux){
  return getFluxTemplate(flux).some(p => p.sections.some(s => s.items.length > 0));
}

function getActiveOptionDefs(data){
  const active = (data && data.activeOptions) || {};
  return (appOptions.projectOptions || []).filter(o => active[o.id]);
}

// Returns the full checklist template for a given project's data: the flux's editable
// base template (see Réglages → Checklists par flux) plus one extra "partie" holding a
// section per active project option.
function projectTemplate(data, flux){
  const base = getFluxTemplate(flux);
  const opts = getActiveOptionDefs(data);
  if(!opts.length) return base;
  const virtualPartie = {
    id: 'p_options',
    title: 'OPTIONS DU PROJET — Modules spécifiques',
    sections: opts.map(o => ({ id: 'opt_' + o.id, title: o.name, items: o.items || [] }))
  };
  return base.concat([virtualPartie]);
}

function projectTotalItems(data, flux){
  let n = 0;
  projectTemplate(data, flux).forEach(p => p.sections.forEach(s => n += s.items.length));
  return n;
}

function countChecked(data, flux){
  let n = 0;
  projectTemplate(data, flux).forEach(p => p.sections.forEach(s => {
    s.items.forEach((_, idx) => {
      const k = itemKey(s.id, idx);
      if(data.checklist[k] && data.checklist[k].checked) n++;
    });
  }));
  return n;
}

let projectStatsCache = {};

function ccStats(data){
  const items = (data && data.customChecklist) || [];
  const checked = items.filter(it => it.checked).length;
  return { checked, total: items.length };
}

async function getProjectStats(id, forceRefresh){
  const proj = projects.find(x => x.id === id);
  const flux = proj ? proj.numFlux : null;
  if(id === currentProjectId && currentData){
    const cc = ccStats(currentData);
    const s = { checked: countChecked(currentData, flux), total: projectTotalItems(currentData, flux), lastModified: currentData.lastModified || null, ccChecked: cc.checked, ccTotal: cc.total };
    projectStatsCache[id] = s;
    return s;
  }
  if(!forceRefresh && projectStatsCache[id]) return projectStatsCache[id];
  const d = await loadProjectData(id);
  const cc = ccStats(d);
  const s = { checked: countChecked(d, flux), total: projectTotalItems(d, flux), lastModified: d.lastModified || null, ccChecked: cc.checked, ccTotal: cc.total };
  projectStatsCache[id] = s;
  return s;
}

  const todayStr = new Date().toISOString().slice(0,10);
  const allRows = [];
  for(const p of sortedProjectsForDisplay(dashShowArchived)){
    const s = await getProjectStats(p.id, true);
    const pct = s.total ? Math.round((s.checked / s.total) * 100) : 0;
    const isOverdue = !p.finished && !!(p.echeance && p.echeance < todayStr && s.checked < s.total);
    const refTime = s.lastModified || p.createdAt || Date.now();
    const daysSince = Math.floor((Date.now() - refTime) / 86400000);
    const isStalled = !p.finished && daysSince > 14 && s.checked < s.total;
    const ccPct = s.ccTotal ? Math.round((s.ccChecked / s.ccTotal) * 100) : 0;
    allRows.push({ p, checked:s.checked, total:s.total, pct, isOverdue, isStalled, daysSince, lastMod: refTime, ccChecked: s.ccChecked, ccTotal: s.ccTotal, ccPct, ccPending: s.ccTotal - s.ccChecked });
  }

  const totalChecked = allRows.reduce((a,r) => a + r.checked, 0);
  const totalPossible = allRows.reduce((a,r) => a + r.total, 0);
  const overdue = allRows.filter(r => r.isOverdue);
  const stalled = allRows.filter(r => r.isStalled && !r.isOverdue);

  const rows = allRows.filter(r => dashboardProjectMatches(r.p) && (!dashFilterOverdueOnly || r.isOverdue));

  const alertsHtml = (overdue.length || stalled.length) ? `
    <div class="alert-section">
      <h3>⚠ Alertes</h3>
      ${overdue.map(r => `<div class="alert-row" data-id="${r.p.id}"><span><b>${escapeHtml(r.p.name)}</b> — échéance dépassée (${new Date(r.p.echeance).toLocaleDateString('fr-FR')})</span><span class="a-info">${r.checked}/${r.total}</span></div>`).join('')}
      ${stalled.map(r => `<div class="alert-row stalled" data-id="${r.p.id}"><span><b>${escapeHtml(r.p.name)}</b> — aucune activité depuis ${r.daysSince} jours</span><span class="a-info">${r.checked}/${r.total}</span></div>`).join('')}
    </div>` : '';

  const fluxOptions = getAllFluxOptions();
  const coordList = appOptions.coordinateurs || [];

  const filterBarHtml = `
    <div class="dash-filter-bar">
      <input type="text" id="dashSearchInput" placeholder="Rechercher un client, un projet, un N° commande…" value="${escapeHtml(dashSearchQuery)}">
      <select id="dashFilterFlux">
        <option value="all">Tous les flux</option>
        ${fluxOptions.map(f => `<option value="${f}" ${dashFilterFlux===f?'selected':''}>${f}</option>`).join('')}
      </select>
      <select id="dashFilterCoord">
        <option value="all">Tous les coordinateurs</option>
        ${coordList.map(c => `<option value="${escapeHtml(c)}" ${dashFilterCoord===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}
      </select>
      <label class="choice-chip"><input type="checkbox" id="dashFilterOverdue" ${dashFilterOverdueOnly?'checked':''}> En retard uniquement</label>
    </div>
  `;

  const cardsHtml = rows.map(r => `
    <div class="project-card ${r.p.finished?'finished':''}" data-id="${r.p.id}">
      <div class="pc-name">${escapeHtml(r.p.client || 'Client non défini')}</div>
      <div class="pc-client">${escapeHtml(r.p.name)}</div>
      ${r.total ? `
      <div class="pbar-cat">Planification</div>
      <div class="pbar"><div class="pbar-fill" style="width:${r.pct}%"></div></div>
      <div class="pbar-label">${r.checked}/${r.total} POINTS · ${r.pct}%</div>
      ` : `<div class="pbar-label">Flux ${escapeHtml(r.p.numFlux || '—')} · pas de checklist</div>`}
      <div class="pbar-cat">Points à traiter</div>
      <div class="pbar"><div class="pbar-fill cc" style="width:${r.ccPct}%"></div></div>
      <div class="pbar-label">${r.ccChecked}/${r.ccTotal} POINTS · ${r.ccPct}%</div>
      <div class="pc-modified">Modifié ${formatRelativeTime(r.lastMod)}</div>
      <div class="badge-row">
        ${!r.p.finished?`<span class="badge ${r.ccPending>=5?'pending-high':(r.ccPending>=1?'pending-low':'pending-zero')}">● ${r.ccPending} points restants</span>`:''}
        ${r.p.finished?'<span class="badge done">✓ Terminé</span>':''}
        ${r.p.archived?'<span class="badge stalled">📦 Archivé</span>':''}
        ${r.isOverdue?'<span class="badge overdue">En retard</span>':''}
        ${r.isStalled?'<span class="badge stalled">Inactif '+r.daysSince+'j</span>':''}
      </div>
    </div>
  `).join('');

  const noMatchHtml = (rows.length === 0) ? '<div class="settings-empty">Aucun projet ne correspond à la recherche/aux filtres.</div>' : '';

  dv.innerHTML = `
    ${seanceSummaryHtml}
    <div class="dashboard-header">
      <h2>Tableau de bord</h2>
      <p>${projects.length} projet(s) · ${totalChecked}/${totalPossible} points cochés au total</p>
    </div>
    ${alertsHtml}
    ${filterBarHtml}
    <div class="project-card-grid">${cardsHtml}</div>
    ${noMatchHtml}
    ${archivedCount ? `<button class="btn btn-ghost" id="dashToggleArchivedBtn" style="margin-top:18px;">${dashShowArchived ? '🙈 Masquer les projets archivés' : `📦 Afficher les projets archivés (${archivedCount})`}</button>` : ''}
  `;
  wireSeanceSummaryClicks(dv);
  dv.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', () => openProject(el.dataset.id)));

  if(hadFocus){
    const si = $('#dashSearchInput');
    si.focus();
    if(caret !== null) si.setSelectionRange(caret, caret);
  }
  $('#dashSearchInput').addEventListener('input', e => { dashSearchQuery = e.target.value; renderDashboardView(); });
  $('#dashFilterFlux').addEventListener('change', e => { dashFilterFlux = e.target.value; renderDashboardView(); });
  $('#dashFilterCoord').addEventListener('change', e => { dashFilterCoord = e.target.value; renderDashboardView(); });
  $('#dashFilterOverdue').addEventListener('change', e => { dashFilterOverdueOnly = e.target.checked; renderDashboardView(); });
  const archBtn = $('#dashToggleArchivedBtn');
  if(archBtn) archBtn.addEventListener('click', () => { dashShowArchived = !dashShowArchived; renderDashboardView(); });
}

/* ============================= ÉCHÉANCES (all projects, sorted by due date) ============================= */

async function renderEcheancesView(){
  await flushAllPending();
  currentView = 'echeances';
  hideAllViews();
  const ev = $('#echeancesView');
  ev.style.display = 'block';
  await renderSidebar();

  const todayStr = new Date().toISOString().slice(0,10);
  const withEcheance = [];
  for(const p of projects){
    if(p.archived || p.finished || !p.echeance) continue;
    const s = await getProjectStats(p.id, true);
    withEcheance.push({ p, s, isOverdue: p.echeance < todayStr });
  }
  withEcheance.sort((a,b) => a.p.echeance < b.p.echeance ? -1 : 1);

  const rowsHtml = withEcheance.length ? withEcheance.map(({p, s, isOverdue}) => {
    const days = Math.ceil((new Date(p.echeance) - new Date(todayStr)) / 86400000);
    const daysLabel = isOverdue ? `en retard de ${Math.abs(days)}j` : (days === 0 ? "aujourd'hui" : `dans ${days}j`);
    const pct = s.total ? Math.round((s.checked/s.total)*100) : 0;

    const planning = getProjectPlanning(p.id);
    let ganttHtml = '';
    if(planning && planning.startDate){
      const spanWeeks = computePlanningSpanWeeks(planning);
      if(spanWeeks > 0){
        const elapsedWeeks = (Date.now() - new Date(planning.startDate + 'T00:00:00').getTime()) / (7*86400000);
        const plannedPct = Math.max(0, Math.min(100, (elapsedWeeks/spanWeeks)*100));
        const realSpanWeeks = computeRealSpanWeeks(planning);
        const realPct = realSpanWeeks !== null ? (realSpanWeeks/spanWeeks)*100 : null;
        const onTrack = realPct !== null && realPct >= plannedPct - 5;
        ganttHtml = `
          <div class="ech-gantt">
            <div class="ech-gantt-track">
              ${realPct!==null ? `<div class="ech-gantt-fill ${onTrack?'ontrack':'late'}" style="width:${Math.min(100,realPct)}%"></div>` : ''}
              <div class="ech-gantt-marker" style="left:${plannedPct}%" title="Où on devrait en être aujourd'hui"></div>
            </div>
            <div class="ech-gantt-label ${realPct!==null ? (onTrack?'ok':'late') : ''}">${realPct!==null ? (onTrack ? '✓ Dans les temps' : '⚠ En retard sur le planning réel') : 'Pas de données réelles'}</div>
          </div>
        `;
      }
    }

    return `
      <div class="ech-row ${isOverdue?'overdue':''}" data-id="${p.id}">
        <div class="ech-date">
          <div class="ech-date-day">${new Date(p.echeance).toLocaleDateString('fr-FR')}</div>
          <div class="ech-date-rel">${daysLabel}</div>
        </div>
        <div class="ech-body">
          <div class="ech-client">${escapeHtml(p.client || 'Client non défini')}</div>
          <div class="ech-name">${escapeHtml(p.name)} · Flux ${escapeHtml(p.numFlux || '—')}${p.coordinateur ? ' · ' + escapeHtml(p.coordinateur) : ''}</div>
          ${ganttHtml}
        </div>
        <div class="ech-progress">${s.total ? `${s.checked}/${s.total} · ${pct}%` : 'Pas de checklist'}</div>
      </div>
    `;
  }).join('') : '<div class="settings-empty">Aucun projet actif avec une échéance définie.</div>';

  ev.innerHTML = `
    <div class="dashboard-header">
      <h2>Échéances</h2>
      <p>Tous les projets actifs (non terminés, non archivés) avec une échéance, triés du plus urgent au plus lointain.</p>
    </div>
    <div class="ech-list">${rowsHtml}</div>
  `;
  ev.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', () => openProject(el.dataset.id)));
}

/* ============================= SÉANCES (Séance du matin / Séance OPE) ============================= */

let seanceMatin = [];
let todoOriginFilter = 'all';
let todoList = [];
// Séance OPE is a small board: unsorted "staging" items above two columns,
// "derniere" (last session) and "jour" (today's session).
let seanceOpeBoard = { staging:[], derniere:[], jour:[] };

function getSimpleList(id){ return id === 'matin' ? seanceMatin : todoList; }
function setSimpleList(id, arr){ if(id === 'matin') seanceMatin = arr; else todoList = arr; }
function seanceStorageKey(id){ if(id === 'matin') return 'seance_matin'; if(id === 'todo') return 'todo_list'; return 'seance_ope'; }
function seanceTitleFor(id){ if(id === 'matin') return 'Séance du matin'; if(id === 'todo') return 'To do list'; return 'Séance OPE'; }

// When "link" is enabled, an item created in Séance du matin/OPE gets a shared linkId
// and a mirrored copy in the To do list. Checking either copy syncs the other(s).
function syncLinkedProjectItem(projectId, linkId, patch){
  if(!linkId || !projectId) return;
  if(projectId === currentProjectId && currentData){
    const it = (currentData.customChecklist || []).find(x => x.linkId === linkId);
    if(it){ Object.assign(it, patch); scheduleSaveProjectData(); }
    return;
  }
  const raw = lsGet('project:' + projectId);
  if(!raw) return;
  const data = JSON.parse(raw);
  const it = (data.customChecklist || []).find(x => x.linkId === linkId);
  if(it){ Object.assign(it, patch); lsSet('project:' + projectId, JSON.stringify(data)); }
}
function deleteLinkedProjectItem(projectId, linkId){
  if(!linkId || !projectId) return;
  if(projectId === currentProjectId && currentData){
    currentData.customChecklist = (currentData.customChecklist || []).filter(x => x.linkId !== linkId);
    scheduleSaveProjectData();
    return;
  }
  const raw = lsGet('project:' + projectId);
  if(!raw) return;
  const data = JSON.parse(raw);
  data.customChecklist = (data.customChecklist || []).filter(x => x.linkId !== linkId);
  lsSet('project:' + projectId, JSON.stringify(data));
}

function syncLinkedItems(linkId, patch){
  if(!linkId) return;
  [seanceMatin, todoList, seanceOpeBoard.staging, seanceOpeBoard.derniere, seanceOpeBoard.jour].forEach(arr => {
    arr.forEach(it => { if(it.linkId === linkId) Object.assign(it, patch); });
  });
  const todoItem = todoList.find(it => it.linkId === linkId && it.origin === 'project');
  if(todoItem && todoItem.originProjectId) syncLinkedProjectItem(todoItem.originProjectId, linkId, patch);
}
function deleteLinkedItems(linkId){
  if(!linkId) return;
  const todoItem = todoList.find(it => it.linkId === linkId && it.origin === 'project');
  if(todoItem && todoItem.originProjectId) deleteLinkedProjectItem(todoItem.originProjectId, linkId);
  seanceMatin = seanceMatin.filter(it => it.linkId !== linkId);
  todoList = todoList.filter(it => it.linkId !== linkId);
  seanceOpeBoard.staging = seanceOpeBoard.staging.filter(it => it.linkId !== linkId);
  seanceOpeBoard.derniere = seanceOpeBoard.derniere.filter(it => it.linkId !== linkId);
  seanceOpeBoard.jour = seanceOpeBoard.jour.filter(it => it.linkId !== linkId);
}
function saveAllLinkedLists(){
  saveSeance('matin');
  saveSeance('todo');
  saveSeanceOpeBoard();
}
function seanceIconFor(id){ if(id === 'matin') return '🌅'; if(id === 'todo') return '✅'; return '🛠'; }

function allOpeItems(){
  return [...seanceOpeBoard.staging, ...seanceOpeBoard.derniere, ...seanceOpeBoard.jour];
}
function opePct(){
  const items = allOpeItems();
  const total = items.length;
  const checked = items.filter(it => it.checked).length;
  return { total, checked, pct: total === 0 ? 100 : Math.round((checked/total)*100) };
}

function seancePct(id){
  if(id === 'ope') return opePct();
  const items = getSimpleList(id);
  const total = items.length;
  const checked = items.filter(it => it.checked).length;
  const pct = total === 0 ? 100 : Math.round((checked / total) * 100);
  return { total, checked, pct };
}

function buildSeanceSummaryHtml(){
  const cards = ['matin', 'ope', 'todo'].map(id => {
    const { total, checked, pct } = seancePct(id);
    const label = total === 0 ? 'Rien à cocher — 100%' : `${checked}/${total} points · ${pct}%`;
    return `
      <div class="seance-summary-card" data-seance="${id}">
        <div class="ssc-icon">${seanceIconFor(id)}</div>
        <div class="ssc-body">
          <div class="ssc-title">${seanceTitleFor(id)}</div>
          <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
          <div class="pbar-label">${label}</div>
        </div>
      </div>
    `;
  }).join('');
  return `<div class="seance-summary-row">${cards}</div>`;
}

function wireSeanceSummaryClicks(container){
  container.querySelectorAll('[data-seance]').forEach(el => el.addEventListener('click', () => renderSeanceView(el.dataset.seance)));
}

function loadSeance(key){
  const v = lsGet(key);
  return v ? JSON.parse(v) : [];
}
function saveSeance(id){
  flashSaveStatus(lsSet(seanceStorageKey(id), JSON.stringify(getSimpleList(id))));
}
function loadSeanceOpeBoard(){
  const v = lsGet('seance_ope');
  if(!v) return { staging:[], derniere:[], jour:[] };
  const parsed = JSON.parse(v);
  if(Array.isArray(parsed)){
    // migrate from the old flat-list format: keep existing points as today's session
    return { staging:[], derniere:[], jour: parsed.map(it => ({ id: it.id, text: it.text, note:'', checked: !!it.checked })) };
  }
  return { staging: parsed.staging || [], derniere: parsed.derniere || [], jour: parsed.jour || [] };
}
function saveSeanceOpeBoard(){
  flashSaveStatus(lsSet('seance_ope', JSON.stringify(seanceOpeBoard)));
}

let seanceSaveTimers = {};
function scheduleSaveSeance(id){
  clearTimeout(seanceSaveTimers[id]);
  seanceSaveTimers[id] = setTimeout(() => saveSeance(id), 300);
}
function flushSeanceSaveSilent(id){
  if(seanceSaveTimers[id]){ clearTimeout(seanceSaveTimers[id]); seanceSaveTimers[id] = null; saveSeance(id); }
}

let opeSaveTimer = null;
function scheduleSaveSeanceOpe(){
  clearTimeout(opeSaveTimer);
  opeSaveTimer = setTimeout(() => saveSeanceOpeBoard(), 300);
}
function flushSeanceOpeSilent(){
  if(opeSaveTimer){ clearTimeout(opeSaveTimer); opeSaveTimer = null; saveSeanceOpeBoard(); }
}

async function renderSeanceView(id){
  await flushAllPending();
  currentView = 'seance_' + id;
  hideAllViews();
  const container = $('#seanceView');
  container.style.display = 'block';
  await renderSidebar();

  if(id === 'ope'){ renderSeanceOpeView(); return; }

  const items = getSimpleList(id);
  const filtered = (id === 'todo' && todoOriginFilter !== 'all')
    ? items.filter(it => (it.origin || 'todo') === todoOriginFilter)
    : items;
  const ordered = filtered.filter(it => !it.checked).concat(filtered.filter(it => it.checked));

  const originLabels = { todo:'📝 Manuel', matin:'🌅 Matin', ope:'🛠 OPE', project:'📁 Projet' };
  const filterBarHtml = (id === 'todo') ? `
    <div class="filter-pills" style="margin-bottom:16px;">
      ${['all','todo','matin','ope','project'].map(f => `<button class="pill ${todoOriginFilter===f?'active':''}" data-origin-filter="${f}">${f==='all'?'Tous':originLabels[f]}</button>`).join('')}
    </div>
  ` : '';

  container.innerHTML = `
    <div class="dashboard-header">
      <h2>${seanceTitleFor(id)}</h2>
      <p>Coche un point pour le faire descendre en bas de liste, en transparence. Rien n'est supprimé, sauf si tu cliques sur ×.</p>
    </div>
    <div class="seance-add-row">
      <input type="text" id="seanceNewItem" placeholder="Ajouter un point…">
      <button class="btn btn-primary" id="seanceAddBtn">+ Ajouter</button>
    </div>
    ${filterBarHtml}
    <div class="seance-list">
      ${ordered.length ? ordered.map(it => {
        const hasNote = !!(it.note && it.note.trim());
        const expanded = expandedItemIds.has(it.id);
        const originTag = (id === 'todo' && it.origin && it.origin !== 'todo')
          ? `<span class="item-badge origin-badge" title="Origine">${it.origin==='project' ? '📁 ' + escapeHtml(it.originProjectName||'Projet') : originLabels[it.origin]}</span>` : '';
        return `
        <div class="seance-item ${it.checked?'done':''}" data-id="${it.id}">
          <div class="seance-item-top">
            <input type="checkbox" class="seance-check" data-id="${it.id}" ${it.checked?'checked':''}>
            <span class="seance-text" data-id="${it.id}" contenteditable="true" spellcheck="false">${escapeHtml(it.text)}</span>
            ${hasNote?'<span class="item-badge" title="A une note">🗒</span>':''}
            ${it.linkId?'<span class="item-badge" title="Lié à une autre liste">🔗</span>':''}
            ${originTag}
            <button class="seance-expand" data-id="${it.id}" title="Note">${expanded?'▾':'▸'}</button>
            <button class="seance-del" data-id="${it.id}" title="Supprimer">×</button>
          </div>
          ${expanded ? noteBlockHtml(it.id, it.note, 'seance-note', `data-id="${it.id}"`) : ''}
        </div>
      `; }).join('') : '<div class="settings-empty">Aucun point pour l\u2019instant. Ajoute ton premier point ci-dessus.</div>'}
    </div>
  `;
  if(id === 'todo'){
    container.querySelectorAll('[data-origin-filter]').forEach(btn => btn.addEventListener('click', () => {
      todoOriginFilter = btn.dataset.originFilter;
      renderSeanceView('todo');
    }));
  }

  function addItem(){
    const input = $('#seanceNewItem');
    const text = input.value.trim();
    if(!text) return;
    if(id === 'matin' && appSettings.linkSeanceTodo){
      const linkId = uid();
      getSimpleList('matin').unshift({ id: uid(), text, checked:false, note:'', linkId });
      todoList.unshift({ id: uid(), text, checked:false, note:'', linkId, origin:'matin' });
      scheduleSaveSeance('matin');
      scheduleSaveSeance('todo');
    } else if(id === 'todo'){
      getSimpleList('todo').unshift({ id: uid(), text, checked:false, note:'', origin:'todo' });
      scheduleSaveSeance('todo');
    } else {
      getSimpleList(id).unshift({ id: uid(), text, checked:false, note:'' });
      scheduleSaveSeance(id);
    }
    input.value = '';
    renderSeanceView(id);
  }
  $('#seanceAddBtn').addEventListener('click', addItem);
  $('#seanceNewItem').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });

  container.querySelectorAll('.seance-check').forEach(cb => cb.addEventListener('change', () => {
    const it = getSimpleList(id).find(x => x.id === cb.dataset.id);
    if(it){
      it.checked = cb.checked;
      if(it.linkId){
        syncLinkedItems(it.linkId, { checked: it.checked });
        saveAllLinkedLists();
      } else {
        scheduleSaveSeance(id);
      }
    }
    renderSeanceView(id);
  }));
  container.querySelectorAll('.seance-del').forEach(btn => btn.addEventListener('click', async () => {
    const it = getSimpleList(id).find(x => x.id === btn.dataset.id);
    const ok = await customConfirm(it && it.linkId ? 'Supprimer ce point ? Il est lié : sa copie dans les autres listes sera supprimée aussi.' : 'Supprimer ce point ?', { okText:'Supprimer' });
    if(!ok) return;
    if(it && it.linkId){
      deleteLinkedItems(it.linkId);
      saveAllLinkedLists();
    } else {
      setSimpleList(id, getSimpleList(id).filter(x => x.id !== btn.dataset.id));
      saveSeance(id);
    }
    renderSeanceView(id);
  }));
  container.querySelectorAll('.seance-text').forEach(span => span.addEventListener('blur', () => {
    const it = getSimpleList(id).find(x => x.id === span.dataset.id);
    const newText = span.textContent.trim();
    if(it && newText && it.text !== newText){
      it.text = newText;
      if(it.linkId){ syncLinkedItems(it.linkId, { text: newText }); saveAllLinkedLists(); }
      else { saveSeance(id); }
    }
  }));
  container.querySelectorAll('.seance-note').forEach(ta => ta.addEventListener('input', () => {
    const it = getSimpleList(id).find(x => x.id === ta.dataset.id);
    if(it){
      it.note = ta.value;
      if(it.linkId){ syncLinkedItems(it.linkId, { note: ta.value }); saveAllLinkedLists(); }
      else { scheduleSaveSeance(id); }
    }
  }));
  container.querySelectorAll('.seance-expand').forEach(btn => btn.addEventListener('click', () => {
    const itemId = btn.dataset.id;
    if(expandedItemIds.has(itemId)) expandedItemIds.delete(itemId); else expandedItemIds.add(itemId);
    renderSeanceView(id);
  }));
  wireNoteToggles(container, () => renderSeanceView(id));
}

/* ---- Séance OPE: two-column drag-and-drop board ---- */

function opeItemCardHtml(it, listName){
  const hasNote = !!(it.note && it.note.trim());
  const expanded = expandedItemIds.has(it.id);
  return `
    <div class="ope-card ${it.checked?'done':''}" draggable="true" data-id="${it.id}" data-from="${listName}">
      <div class="ope-card-top">
        <input type="checkbox" class="ope-check" data-id="${it.id}" data-list="${listName}" ${it.checked?'checked':''}>
        <span class="ope-text" data-id="${it.id}" data-list="${listName}" contenteditable="true" spellcheck="false">${escapeHtml(it.text)}</span>
        ${hasNote?'<span class="item-badge" title="A une note">🗒</span>':''}
        ${it.linkId?'<span class="item-badge" title="Lié à la To do list">🔗</span>':''}
        <button class="ope-expand" data-id="${it.id}" data-list="${listName}" title="Note">${expanded?'▾':'▸'}</button>
        <button class="ope-del" data-id="${it.id}" data-list="${listName}" title="Supprimer">×</button>
      </div>
      ${expanded ? noteBlockHtml(it.id, it.note, 'ope-note', `data-id="${it.id}" data-list="${listName}"`) : ''}
    </div>
  `;
}

function renderSeanceOpeView(){
  const container = $('#seanceView');
  const b = seanceOpeBoard;

  container.innerHTML = `
    <div class="dashboard-header">
      <h2>Séance OPE</h2>
      <p>Ajoute un point, puis glisse-le dans la colonne voulue — ou écris directement dans la colonne visée.</p>
    </div>
    <div class="seance-add-row">
      <input type="text" id="opeNewItem" placeholder="Ajouter un point…">
      <button class="btn btn-primary" id="opeAddBtn">+ Ajouter</button>
    </div>
    <div class="ope-staging" id="opeStagingZone" data-list="staging">
      ${b.staging.length ? b.staging.map(it => opeItemCardHtml(it,'staging')).join('') : '<div class="ope-staging-empty">Les nouveaux points non triés apparaissent ici — glisse-les dans une colonne.</div>'}
    </div>
    <div class="ope-board">
      <div class="ope-column" data-list="derniere">
        <div class="ope-column-head"><h4>Dernière séance</h4><span class="opt-count">${b.derniere.length} pt(s)</span></div>
        <div class="ope-column-add"><input type="text" class="ope-col-add-input" data-list="derniere" placeholder="Ajouter directement ici…"></div>
        <div class="ope-column-body">${b.derniere.length ? b.derniere.map(it => opeItemCardHtml(it,'derniere')).join('') : '<div class="settings-empty">Vide.</div>'}</div>
      </div>
      <div class="ope-column" data-list="jour">
        <div class="ope-column-head"><h4>Séance du jour</h4><span class="opt-count">${b.jour.length} pt(s)</span></div>
        <div class="ope-column-add"><input type="text" class="ope-col-add-input" data-list="jour" placeholder="Ajouter directement ici…"></div>
        <div class="ope-column-body">${b.jour.length ? b.jour.map(it => opeItemCardHtml(it,'jour')).join('') : '<div class="settings-empty">Vide.</div>'}</div>
      </div>
    </div>
    <div class="ope-actions">
      <button class="btn btn-ghost" id="opeArchiveBtn">🔁 Basculer « Séance du jour » vers « Dernière séance »</button>
      <button class="btn btn-ghost" id="opeClearCheckedBtn">🗑 Supprimer les points cochés</button>
    </div>
  `;

  function makeOpeItem(text){
    if(appSettings.linkSeanceTodo){
      const linkId = uid();
      todoList.unshift({ id: uid(), text, checked:false, note:'', linkId, origin:'ope' });
      scheduleSaveSeance('todo');
      return { id: uid(), text, note:'', checked:false, linkId };
    }
    return { id: uid(), text, note:'', checked:false };
  }

  function addToStaging(){
    const input = $('#opeNewItem');
    const text = input.value.trim();
    if(!text) return;
    b.staging.unshift(makeOpeItem(text));
    input.value = '';
    scheduleSaveSeanceOpe();
    renderSeanceOpeView();
  }
  $('#opeAddBtn').addEventListener('click', addToStaging);
  $('#opeNewItem').addEventListener('keydown', e => { if(e.key === 'Enter') addToStaging(); });

  container.querySelectorAll('.ope-col-add-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if(e.key !== 'Enter') return;
      const text = inp.value.trim();
      if(!text) return;
      b[inp.dataset.list].unshift(makeOpeItem(text));
      scheduleSaveSeanceOpe();
      renderSeanceOpeView();
    });
  });

  container.querySelectorAll('.ope-check').forEach(cb => cb.addEventListener('change', () => {
    const it = b[cb.dataset.list].find(x => x.id === cb.dataset.id);
    if(it){
      it.checked = cb.checked;
      if(it.linkId){
        syncLinkedItems(it.linkId, { checked: it.checked });
        saveAllLinkedLists();
      } else {
        scheduleSaveSeanceOpe();
      }
    }
    renderSeanceOpeView();
  }));

  container.querySelectorAll('.ope-del').forEach(btn => btn.addEventListener('click', async () => {
    const it = b[btn.dataset.list].find(x => x.id === btn.dataset.id);
    const ok = await customConfirm(it && it.linkId ? 'Supprimer ce point ? Il est lié : sa copie dans les autres listes sera supprimée aussi.' : 'Supprimer ce point ?', { okText:'Supprimer' });
    if(!ok) return;
    if(it && it.linkId){
      deleteLinkedItems(it.linkId);
      saveAllLinkedLists();
    } else {
      b[btn.dataset.list] = b[btn.dataset.list].filter(x => x.id !== btn.dataset.id);
      scheduleSaveSeanceOpe();
    }
    renderSeanceOpeView();
  }));

  container.querySelectorAll('.ope-text').forEach(span => span.addEventListener('blur', () => {
    const it = b[span.dataset.list].find(x => x.id === span.dataset.id);
    const newText = span.textContent.trim();
    if(it && newText && it.text !== newText){
      it.text = newText;
      if(it.linkId){ syncLinkedItems(it.linkId, { text: newText }); saveAllLinkedLists(); }
      else { scheduleSaveSeanceOpe(); }
    }
  }));
  container.querySelectorAll('.ope-note').forEach(ta => ta.addEventListener('input', () => {
    const it = b[ta.dataset.list].find(x => x.id === ta.dataset.id);
    if(it){
      it.note = ta.value;
      if(it.linkId){ syncLinkedItems(it.linkId, { note: ta.value }); saveAllLinkedLists(); }
      else { scheduleSaveSeanceOpe(); }
    }
  }));

  container.querySelectorAll('.ope-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', JSON.stringify({ id: card.dataset.id, from: card.dataset.from }));
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });

  const dropZones = [$('#opeStagingZone'), ...container.querySelectorAll('.ope-column')];
  dropZones.forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      let data;
      try{ data = JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){ return; }
      const toList = zone.dataset.list;
      if(!data || data.from === toList) return;
      const idx = b[data.from].findIndex(x => x.id === data.id);
      if(idx < 0) return;
      const [item] = b[data.from].splice(idx, 1);
      b[toList].unshift(item);
      scheduleSaveSeanceOpe();
      renderSeanceOpeView();
    });
  });

  $('#opeArchiveBtn').addEventListener('click', async () => {
    if(b.jour.length === 0){ showToast('Aucun point dans « Séance du jour »'); return; }
    const ok = await customConfirm("Basculer tous les points de « Séance du jour » vers « Dernière séance » ? Le contenu actuel de « Dernière séance » sera remplacé.", { okText:'Basculer', danger:false });
    if(!ok) return;
    b.derniere = b.jour;
    b.jour = [];
    scheduleSaveSeanceOpe();
    renderSeanceOpeView();
    showToast('Séance basculée');
  });

  $('#opeClearCheckedBtn').addEventListener('click', async () => {
    const totalChecked = allOpeItems().filter(it => it.checked).length;
    if(totalChecked === 0){ showToast('Aucun point coché'); return; }
    const ok = await customConfirm(`Supprimer les ${totalChecked} point(s) coché(s) ? Les points liés seront aussi supprimés de leurs autres listes.`, { okText:'Supprimer' });
    if(!ok) return;
    const linkIdsToDelete = new Set();
    ['staging','derniere','jour'].forEach(l => {
      b[l].filter(it => it.checked && it.linkId).forEach(it => linkIdsToDelete.add(it.linkId));
    });
    linkIdsToDelete.forEach(lid => deleteLinkedItems(lid));
    ['staging','derniere','jour'].forEach(l => { b[l] = b[l].filter(it => !it.checked); });
    saveAllLinkedLists();
    renderSeanceOpeView();
  });
  container.querySelectorAll('.ope-expand').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const itemId = btn.dataset.id;
    if(expandedItemIds.has(itemId)) expandedItemIds.delete(itemId); else expandedItemIds.add(itemId);
    renderSeanceOpeView();
  }));
  wireNoteToggles(container, renderSeanceOpeView);
}
